<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>课程内容审核</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f7f8fb;color:#243447;font-family:Arial,"Microsoft YaHei",sans-serif;padding:18px}.wrap{max-width:1180px;margin:auto}.hero,.panel{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 8px 24px rgba(30,60,90,.07)}h1{margin:0 0 6px;color:#1d4ed8}.muted{color:#64748b;font-size:13px;line-height:1.6}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.tabs button{border:0;border-radius:999px;padding:9px 14px;background:#e8eefc;color:#1e40af;font-weight:800;cursor:pointer}.tabs button.active{background:#2563eb;color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.card{border:1px solid #e5e7eb;border-radius:14px;padding:13px;background:#fbfdff}.card h3{margin:0 0 6px;font-size:16px;color:#1e3a8a}.tag{display:inline-block;background:#eef2ff;color:#4338ca;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:800;margin:2px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:9px;border-bottom:1px solid #e5e7eb;text-align:left;vertical-align:top}th{background:#eff6ff;color:#1e40af}.line{padding:10px 0;border-bottom:1px dashed #dbe3ee}.line:last-child{border-bottom:0}.note{border-left:4px solid #f59e0b;background:#fffbeb;padding:10px;margin-top:10px;font-size:13px}@media(max-width:700px){body{padding:10px}table{font-size:12px}}
</style>
</head>
<body><main class="wrap"><section class="hero"><h1 id="title">课程内容审核</h1><div id="meta" class="muted">正在读取课程草案……</div><div class="note">页面中的内容分为“教材原始数据”和“教学扩展”。请重点审核课文、答案、英文翻译和扩展题目。</div></section><nav class="tabs" id="tabs"></nav><section id="app" class="panel"></section></main>
<script>
var data=null,tab="overview";
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;")}
function setTab(t){tab=t;document.querySelectorAll(".tabs button").forEach(function(b){b.classList.toggle("active",b.dataset.tab===t)});render()}
function card(title,body){return'<div class="card"><h3>'+esc(title)+'</h3>'+body+'</div>'}
function renderOverview(){var m=data.meta;return'<div class="grid">'+card("课程信息",'<div class="line"><b>'+esc(m.lessonKey)+'</b> · '+esc(m.title)+'</div><div class="muted">'+esc(m.titleEn)+'<br>'+esc(m.topic)+'</div>')+card("内容规模",'<div class="line">生词：'+data.vocabulary.length+' 个</div><div class="line">课文：'+data.texts.length+' 组</div><div class="line">语法：'+data.grammar.length+' 个</div><div class="line">课前题：'+data.preClass.questions.length+' 道</div>')+card("题库规模",'<div class="line">课中题：'+Object.keys(data.classProQuestions).reduce(function(n,k){return n+data.classProQuestions[k].length},0)+' 道</div><div class="line">课后共享题：'+data.postClassHomework.shared_pool.length+' 道</div><div class="line">A/B/C：'+Object.keys(data.postClassHomework.tier_pools).map(function(k){return k+"档 "+data.postClassHomework.tier_pools[k].length+"道"}).join(" · ")+'</div>')+'</div><div class="panel"><h2>审核重点</h2><ul><li>确认教材原句和人物名称。</li><li>确认英文翻译、拼音和答案。</li><li>确认教学扩展是否符合课堂实际。</li><li>确认 A/B/C 难度是否合适。</li></ul></div>'}
function renderVocab(){return'<h2>生词与专有名词</h2><table><tr><th>ID</th><th>汉字</th><th>拼音</th><th>词性</th><th>英文</th><th>标签</th></tr>'+data.vocabulary.concat(data.properNouns||[]).map(function(x){return'<tr><td>'+esc(x.id)+'</td><td><b>'+esc(x.hanzi)+'</b></td><td>'+esc(x.pinyin)+'</td><td>'+esc(x.pos||"专有名词")+'</td><td>'+esc(x.english)+'</td><td>'+((x.tags||[]).map(function(t){return'<span class="tag">'+esc(t)+'</span>'}).join(''))+'</td></tr>'}).join('')+'</table>'}
function renderTexts(){return'<h2>课文与对话</h2>'+data.texts.map(function(t){return'<div class="card"><h3>'+esc(t.title)+' · '+esc(t.scene)+'</h3>'+t.lines.map(function(l){return'<div class="line"><b>'+esc(l.speaker)+'：</b>'+esc(l.hanzi)+'<br><span class="muted">'+esc(l.pinyin)+'<br>'+esc(l.english)+'</span></div>'}).join('')+'</div>'}).join('')}
function renderGrammar(){return'<h2>语法</h2>'+data.grammar.map(function(g){return'<div class="card"><h3>'+esc(g.title)+'</h3><div>'+esc(g.explanation)+'</div><div class="line"><b>例句：</b>'+esc(g.examples[0].hanzi)+'<br><span class="muted">'+esc(g.examples[0].pinyin)+' · '+esc(g.examples[0].english)+'</span></div><div class="muted">'+esc(g.formula.pattern)+' · '+esc(g.formula.note)+'</div></div>'}).join('')}
function questionCard(q){return card(q.id+' · '+q.type,'<div>'+esc(q.prompt_cn)+'</div><div class="muted">'+esc(q.prompt_en||'')+'</div><div class="line">答案：'+esc(q.correct_answer||q.reference_answer||'需教师批改')+'</div><div class="muted">知识点：'+esc(q.kp||((q.tags||[]).join('、'))||'未填写')+'</div><div class="muted">来源：'+esc(q.sourceType||'未标记')+' · 状态：'+esc(q.contentStatus||'未标记')+'</div><div class="muted">命题原则：'+esc(q.principle||'未填写')+'</div>')}
function renderQuestions(){var h='<h2>课前、课中与课后题目</h2><h3>课前</h3><div class="grid">'+data.preClass.questions.map(questionCard).join('')+'</div><h3>课中</h3><div class="grid">';Object.keys(data.classProQuestions).forEach(function(k){data.classProQuestions[k].forEach(function(q){h+=questionCard(q)})});h+='</div><h3>课后</h3><div class="grid">'+data.postClassHomework.shared_pool.concat(data.postClassHomework.tier_pools.A,data.postClassHomework.tier_pools.B,data.postClassHomework.tier_pools.C).map(questionCard).join('')+'</div>';return h}
function render(){if(!data)return;var html=tab==='vocab'?renderVocab():tab==='texts'?renderTexts():tab==='grammar'?renderGrammar():tab==='questions'?renderQuestions():renderOverview();document.getElementById('app').innerHTML=html}
function init(){fetch('../data-model/HSK1-L01_content_draft.json').then(function(r){return r.json()}).then(function(d){data=d;document.getElementById('title').textContent=d.meta.lessonKey+' · '+d.meta.title;document.getElementById('meta').textContent=d.meta.titleEn+' · '+d.meta.topic;var items=[['overview','总览'],['vocab','生词'],['texts','课文'],['grammar','语法'],['questions','练习题']];document.getElementById('tabs').innerHTML=items.map(function(x){return'<button data-tab="'+x[0]+'" onclick="setTab(\''+x[0]+'\')">'+x[1]+'</button>'}).join('');setTab('overview')}).catch(function(e){document.getElementById('app').textContent='读取失败：'+e})}init();
</script><script>
fetch('../data-model/HSK1-L01_question_pool_draft.json').then(function(r){return r.json()}).then(function(pool){if(!data)return;data.preClass=pool.preClass;data.classProQuestions={};Object.keys(pool.questionPool).filter(function(k){return k!=='vocab_collocations'}).forEach(function(k){data.classProQuestions[k]=pool.questionPool[k]});data.classProQuestions.vocab_collocations=pool.questionPool.vocab_collocations.map(function(g){return{id:g.id,type:'vocab_collocations',prompt_cn:g.label,prompt_en:'每组4词，共'+g.sentences.length+'道填空',correct_answer:g.sentences.map(function(s){return s.sentence+' → '+s.answer}).join('；'),kp:(g.targetKnowledge||[]).join('、'),sourceType:g.sourceType,principle:g.principle,difficultyReason:g.difficultyReason,contentStatus:g.contentStatus}});data.postClassHomework.shared_pool=pool.postClassHomework.shared_pool;data.postClassHomework.tier_pools=pool.postClassHomework.tier_pools;render()}).catch(function(e){console.warn('question pool not loaded',e)});
</script></body></html>
