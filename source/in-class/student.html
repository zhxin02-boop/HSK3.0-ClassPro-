<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ClassPro+ Student</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.0/mqtt.min.js"></script>

<style>
*{box-sizing:border-box}
:root{--green:#6ea72d;--dark:#203421;--soft:#f7f9ef;--line:#dfeac8;--blue:#2563eb;--red:#c0392b}
body{margin:0;min-height:100vh;font-family:Arial,"Microsoft YaHei",sans-serif;background:radial-gradient(circle at top,#eef7d9 0,#f7f9ef 42%,#fffaf3 100%);color:var(--dark);padding:16px}
.product-nav{display:flex;gap:4px;align-items:center;flex-wrap:nowrap;overflow-x:auto;padding:8px 10px;margin:-16px auto 12px;max-width:620px;white-space:nowrap}.product-nav a{padding:6px 8px;border-radius:999px;text-decoration:none;color:#74806d;background:rgba(255,255,255,.7);font-size:11px;font-weight:900;white-space:nowrap;flex:0 0 auto}.product-nav a.active,.product-nav a:hover{background:#edf6d9;color:#3f7f32}.product-nav .brand{font-weight:900;color:#3f7f32;margin-right:0}
.wrap{max-width:620px;margin:0 auto}
.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;box-shadow:0 16px 38px rgba(86,115,55,.13);padding:20px;margin:14px 0}
.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,#ffffff,#f2f8e4)}
.hero:after{content:"";position:absolute;right:-38px;top:-44px;width:130px;height:130px;border-radius:50%;background:#dcedb4;opacity:.8}
h1{font-size:25px;margin:8px 0 4px;color:#3f7f32}
.muted{color:#74806d;font-size:13px;line-height:1.45}
.status{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;background:#edf6d9;color:#4c782c;font-size:12px;font-weight:900}
input{width:100%;padding:14px;border:1px solid #d8e4bf;border-radius:14px;font-size:16px;background:#fff}
button{border:0;border-radius:16px;padding:13px 16px;font-size:17px;font-weight:900;background:var(--green);color:#fff;cursor:pointer}
button:disabled{opacity:.45;cursor:not-allowed}
.name-row{display:flex;gap:8px;align-items:center}.name-row input{flex:1}.name-row button{white-space:nowrap}
.prompt{font-size:13px;color:#71806b;text-align:center;margin-bottom:8px;font-weight:800}
.pinyin{font-size:16px;color:#6f7e68;text-align:center;margin-bottom:6px;line-height:1.5}
.hanzi{font-size:27px;font-weight:900;text-align:center;line-height:1.5;color:var(--dark);font-family:KaiTi,STKaiti,"Kaiti SC","Microsoft YaHei",serif}
.english{font-size:14px;color:#6d7380;text-align:center;line-height:1.5;margin-top:6px}
.hint{background:#f8faf3;border:1px solid var(--line);border-radius:18px;padding:18px;text-align:center;margin:12px 0}
.options{display:flex;flex-wrap:wrap;justify-content:center;gap:12px 14px;min-height:130px;margin-top:18px;padding:8px}
.option{min-width:96px;padding:13px 17px;border:2px solid var(--line);border-radius:20px;background:#fff;color:var(--dark);text-align:center;font-weight:900;font-size:21px;box-shadow:0 10px 22px rgba(75,101,50,.08)}
.option .py{display:block;font-size:12px;color:#78836f;margin-bottom:4px}
.option.sel{border-color:var(--blue);background:#dbeafe;box-shadow:0 0 0 4px rgba(37,99,235,.15)}
.match-board{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;margin-top:12px}
.match-col{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;min-height:180px}
.match-card{min-width:118px;padding:14px 16px;border:2px solid var(--line);border-radius:18px;background:#fff;color:var(--dark);text-align:center;font-weight:900;font-size:20px;box-shadow:0 10px 22px rgba(75,101,50,.08)}
.match-card .py{display:block;font-size:12px;color:#78836f;margin-bottom:4px}.match-card.sel{border-color:var(--blue);background:#dbeafe}.match-card.done{border-color:#86c76b;background:#edf9e8;opacity:.72}
.chunks{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;min-height:58px;padding:10px;border-radius:14px;background:#f8faf3}
.chunk{padding:10px 14px;border:1px solid #cfe2a5;border-radius:12px;background:#fff;color:var(--dark);font-weight:900;text-align:center}.chunk .py{display:block;font-size:11px;color:#78836f;text-align:center;margin-bottom:3px}.answer{border:2px dashed #9ac45b;background:#f4fae8}
.ok{color:#2f7d32;font-weight:900;text-align:center;padding:20px}.bad{color:var(--red);font-weight:900;text-align:center;padding:20px}
.leader-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.leader-title{font-size:18px;font-weight:900;color:#3f7f32}.leader-sub{font-size:12px;color:#74806d}
.leader-row{display:grid;grid-template-columns:34px 1fr 56px;align-items:center;gap:8px;padding:9px 10px;border-radius:13px;background:#f8faf3;margin:6px 0;border:1px solid #edf3dc}
.leader-row.me{background:#edf6d9;border-color:#9ac45b;box-shadow:0 8px 18px rgba(127,170,50,.14)}.leader-rank{font-weight:900;color:var(--green);text-align:center}.leader-name{font-size:13px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.leader-pts{text-align:right;font-size:15px;font-weight:900}.leader-empty{padding:14px;border-radius:13px;background:#f8faf3;color:#74806d;text-align:center;font-size:13px}
</style>
</head>
<body>
<nav class="product-nav"><a class="brand" href="../student/index.html">学生界面 / Student Home</a><a href="../pre-class/index.html">课前预习 / Preview</a><a class="active" href="student.html">课中互动 / Class</a><a href="../post-class/student-report.html">课后作业 / Homework</a></nav>
<div class="wrap">
  <div class="card hero">
    <div class="status" id="status">connecting</div>
    <h1>Chinese ClassPro+</h1>
    <div class="muted">扫码进入课堂，接收老师推送的题目，提交后实时计入排行榜。</div>
  </div>
  <div class="card" id="nameBox">
    <div class="muted" style="margin-bottom:8px">Your name / 姓名</div>
    <div class="name-row">
      <select id="studentName" style="flex:1;width:100%;padding:14px;border:1px solid #d8e4bf;border-radius:14px;font-size:16px;background:#fff"><option value="">Select your name / 选择姓名</option></select>
      <button onclick="confirmName()">确认 / Confirm</button>
    </div>
    <div class="muted" id="nameHint" style="margin-top:8px">输入姓名后点击确认，或按 Enter。</div>
  </div>
  <div class="card" id="app"><div class="muted">等待老师发送题目...</div></div>
  <div class="card" id="leaderboard">
    <div class="leader-head"><div><div class="leader-title">实时排行榜</div><div class="leader-sub">Live ranking · 等老师开始答题后自动更新</div></div><div class="status" id="myRank">--</div></div>
    <div id="leaderRows" class="leader-empty">等待课堂积分...</div>
  </div>
</div>
<script>
var query=new URLSearchParams(location.search),RM=query.get("room")||"8888",LESSON=query.get("lesson")||((window.ClassProContext&&ClassProContext.read().lesson)||"HSK1-L01");
var current=null, selected=null, chunks=[], answerChunks=[], nameReady=false, matchLeft=null, matchRight=null, matchPairs={};
var CLASS_STUDENTS=window.CLASS_STUDENTS||[];
var scoreboard={rows:CLASS_STUDENTS.map(function(n){return{name:n,points:0}}),updatedAt:null};
function es(s){return String(s==null?"":s).replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function norm(s){return String(s||"").replace(/[\s\u3000]/g,"").replace(/[\u3002\uff0c\uff01\uff1f\u3001\uff1b\uff1a.,!?;:()]/g,"")}
function normName(s){return String(s||"").trim().replace(/\s+/g," ").toUpperCase()}
function rosterName(s){var n=normName(s);for(var i=0;i<CLASS_STUDENTS.length;i++){if(normName(CLASS_STUDENTS[i])===n)return CLASS_STUDENTS[i]}return String(s||"").trim()}
function py(s){var m={"我":"wǒ","你":"nǐ","他":"tā","她":"tā","是":"shì","不是":"bú shì","不":"bù","也":"yě","很":"hěn","学生":"xuéshēng","老师":"lǎoshī","同学":"tóngxué","叫":"jiào","认识":"rènshi","认识你":"rènshi nǐ","高兴":"gāoxìng","很高兴":"hěn gāoxìng","对不起":"duìbuqǐ","没关系":"méi guānxi","你好":"nǐ hǎo","再见":"zàijiàn","谢谢":"xièxie","安妮":"Ānnī","李文":"Lǐ Wén","白家月":"Bái Jiāyuè","名字":"míngzi","什么":"shénme","王一飞":"Wáng Yīfēi","陈天中":"Chén Tiānzhōng","妈妈":"māma","请问":"qǐngwèn","认":"rèn","识":"shí"};return m[String(s||"")]||""}
function name(){return rosterName(document.getElementById("studentName").value)||"Student"}
function confirmName(){var el=document.getElementById("studentName");el.value=name();nameReady=true;document.getElementById("nameHint").innerHTML='已确认：<b>'+es(name())+'</b>';el.disabled=true;publishPresence();renderBoard()}
function setStatus(t){document.getElementById("status").textContent=t}
function publishPresence(){if(window.client&&client.connected)client.publish("classpro/room/"+RM+"/presence",JSON.stringify({count:1,studentName:name(),name:name(),seenAt:new Date().toISOString(),requestCurrent:true}))}
function renderRosterOptions(){document.getElementById("studentName").innerHTML='<option value="">Select your name / 选择姓名</option>'+CLASS_STUDENTS.map(function(n){return'<option value="'+es(n)+'">'+es(n)+'</option>'}).join("")}
function renderBoard(){var rows=(scoreboard.rows&&scoreboard.rows.length?scoreboard.rows:CLASS_STUDENTS.map(function(n){return{name:n,points:0}})).slice();rows.sort(function(a,b){return (b.points||0)-(a.points||0)||CLASS_STUDENTS.indexOf(a.name)-CLASS_STUDENTS.indexOf(b.name)});var me=normName(name()),myIdx=-1,h="";for(var i=0;i<Math.min(rows.length,10);i++){var r=rows[i],mine=normName(r.name)===me;if(mine)myIdx=i;h+='<div class="leader-row '+(mine?'me':'')+'"><div class="leader-rank">'+(i+1)+'</div><div class="leader-name">'+es(r.name)+'</div><div class="leader-pts">'+(r.points||0)+' pts</div></div>'}if(myIdx<0){for(var j=0;j<rows.length;j++){if(normName(rows[j].name)===me){myIdx=j;break}}}document.getElementById("leaderRows").innerHTML=h||'<div class="leader-empty">等待课堂积分...</div>';document.getElementById("myRank").textContent=myIdx>=0?"#"+(myIdx+1):"--"}
function qdata(){return current&&current.question?current.question.data||{}:{}}
function optionGrid(opts,showPy){var d=qdata(),pys=d.options_pinyin||[],h='<div class="options">';(opts||[]).forEach(function(o,i){var rot=[-2,1.5,-1,2,0.5,-1.5][i%6],dy=[0,10,-6,6,-10,4][i%6],opy=pys[i]||py(o);h+='<button class="option '+(selected===i?'sel':'')+'" onclick="pick('+i+')" style="transform:translateY('+dy+'px) rotate('+rot+'deg)">'+(showPy&&opy?'<span class="py">'+es(opy)+'</span>':'')+es(o)+'</button>'});return h+'</div><button style="width:100%;margin-top:16px" onclick="submitChoice()" '+(selected==null?'disabled':'')+'>提交 Submit</button>'}
function render(){if(!current){document.getElementById("app").innerHTML='<div class="muted">等待老师发送题目...</div>';return}var q=current.question,d=qdata(),mode=current.mode,h='<div class="prompt">'+es(q.prompt_cn||"")+'</div>';if(mode==="v1"){var pic=d.image?'<img src="'+es(d.image)+'" alt="" style="width:100%;max-height:220px;object-fit:contain;border-radius:14px;background:#fff">':'<div class="hanzi">'+es(d.image_hint||"")+'</div>';h+='<div class="hint"><div class="muted">Look at the picture. Choose the word.</div>'+pic+'</div>'+optionGrid(d.options||[],true)}else if(mode==="v4"){h+='<div class="pinyin">'+es(d.template_pinyin||"")+'</div><div class="hanzi">'+es(d.template||"")+'</div>'+optionGrid(d.options||[],true)}else if(mode==="v5"){h+='<div class="pinyin">'+es(d.sentence_pinyin||"")+'</div><div class="hanzi">'+es(d.sentence||"")+'</div>'+optionGrid(d.options||[],true)}else if(mode==="v7"){h+='<div class="hint"><div class="muted">Choose the word that fits the sentence.</div><div class="pinyin">'+es(d.sentence_pinyin||"")+'</div><div class="hanzi">'+es(d.sentence||"")+'</div></div>'+optionGrid(d.options||[],true)}else if(mode==="v8"){var pairs=d.pairs||[],order=d.order||pairs.map(function(_,i){return i}),done=Object.keys(matchPairs).length;h+='<div style="text-align:center;font-weight:900;color:#d16b35;margin-bottom:8px">词了个词 / Matching Game</div><div class="muted" style="text-align:center">先点中文，再点英文。'+done+' / '+pairs.length+'</div><div class="match-board"><div class="match-col">';pairs.forEach(function(p,i){var cls=matchPairs[i]?' done':matchLeft===i?' sel':'';h+='<button class="match-card'+cls+'" onclick="pickMatch(\'L\','+i+')"><span class="py">'+es(p.left_pinyin||py(p.left))+'</span>'+es(p.left)+'</button>'});h+='</div><div class="match-col">';order.forEach(function(idx){var p=pairs[idx]||{},used=false;for(var k in matchPairs){if(matchPairs[k]===idx)used=true}var cls=used?' done':matchRight===idx?' sel':'';h+='<button class="match-card'+cls+'" onclick="pickMatch(\'R\','+idx+')">'+es(p.right||"")+'</button>'});h+='</div></div><button style="width:100%;margin-top:18px" onclick="submitMatching()" '+(done<pairs.length?'disabled':'')+'>提交 Submit</button>'}else if(mode==="w1"){h+='<div class="hint"><div class="muted">Choose the right character.</div><div class="pinyin">'+es(d.sentence_pinyin||"")+'</div><div class="hanzi">'+es(d.sentence||"")+'</div></div>'+optionGrid(d.options||[],false)}else if(mode==="ttq"&&d.options&&d.options.length){h+='<div class="hint"><div class="muted">Read and choose.</div><div class="hanzi" style="font-size:20px;line-height:1.6">'+es(d.passage||d.statement||"")+'</div><div class="pinyin">'+es(d.statement_pinyin||"")+'</div><div class="english">'+es(d.question_en||d.statement_en||"")+'</div><div class="hanzi">'+es(d.question_cn||"")+'</div></div>'+optionGrid(d.options||[],false)}else if(mode==="g1"){if(!chunks.length){chunks=(d.chunks||[]).map(function(t,i){return{id:i,t:t,u:false}}).sort(function(){return Math.random()-.5});answerChunks=[]}h+='<div class="chunks">';chunks.forEach(function(c,i){if(!c.u)h+='<div class="chunk" onclick="moveChunk('+i+')"><span class="py">'+es(py(c.t))+'</span>'+es(c.t)+'</div>'});h+='</div><div class="chunks answer">';if(!answerChunks.length)h+='<span class="muted">点击上面的词块</span>';answerChunks.forEach(function(c,i){h+='<div class="chunk" onclick="backChunk('+i+')"><span class="py">'+es(py(c.t))+'</span>'+es(c.t)+'</div>'});h+='</div><button style="width:100%;margin-top:16px" onclick="submitOrdering()" '+(!answerChunks.length?'disabled':'')+'>提交 Submit</button>'}else{h+='<div class="muted">当前题型暂未接入学生端。</div>'}document.getElementById("app").innerHTML=h}
function pick(i){selected=i;render()}
function pickMatch(side,idx){if(side==="L"){if(matchPairs[idx]!=null)return;matchLeft=idx}else{var used=false;for(var k in matchPairs){if(matchPairs[k]===idx)used=true}if(used)return;matchRight=idx}if(matchLeft!=null&&matchRight!=null){if(matchLeft===matchRight)matchPairs[matchLeft]=matchRight;matchLeft=null;matchRight=null}render()}
function moveChunk(i){chunks[i].u=true;answerChunks.push(chunks[i]);render()}
function backChunk(i){var c=answerChunks.splice(i,1)[0];chunks.forEach(function(x){if(x.id===c.id)x.u=false});render()}
function resultFor(ans,idx){var q=current.question,d=qdata(),mode=current.mode,acc=q.acceptable_answers&&q.acceptable_answers.length?q.acceptable_answers:[q.correct_answer||""];if(d.options&&d.options.length&&acc.some(function(x){return norm(x)===norm((d.options||[])[idx])}))return"correct";if(mode==="ttq"&&d.options&&d.options.length)return idx===d.correct_index?"correct":"wrong";if(typeof d.correct_index==="number")return idx===d.correct_index?"correct":"wrong";return acc.some(function(x){return norm(x)===norm(ans)})?"correct":"wrong"}
function publish(ans,idx){if(!nameReady)confirmName();var payload={room:RM,lesson:LESSON,studentName:name(),name:name(),answer:ans,text:ans,questionId:current.question.id,mode:current.mode,autoResult:resultFor(ans,idx),submittedAt:new Date().toISOString()};client.publish("classpro/room/"+RM+"/answers",JSON.stringify(payload));document.getElementById("app").innerHTML='<div class="'+(payload.autoResult==="correct"?'ok':'bad')+'">'+(payload.autoResult==="correct"?'提交成功：正确！':'提交成功：请看老师反馈')+'</div>'}
function submitChoice(){var d=qdata();publish((d.options||[])[selected]||"",selected)}
function submitOrdering(){publish(answerChunks.map(function(c){return c.t}).join(""),-1)}
function submitMatching(){if(!nameReady)confirmName();var pairs=qdata().pairs||[],ok=Object.keys(matchPairs).length===pairs.length,ans=pairs.map(function(p,i){return(p.left||"")+"="+((pairs[matchPairs[i]]||{}).right||"")}).join("; ");var payload={room:RM,lesson:LESSON,studentName:name(),name:name(),answer:ans,text:ans,questionId:current.question.id,mode:current.mode,autoResult:ok?"correct":"wrong",submittedAt:new Date().toISOString()};client.publish("classpro/room/"+RM+"/answers",JSON.stringify(payload));document.getElementById("app").innerHTML='<div class="'+(ok?'ok':'bad')+'">'+(ok?'提交成功：正确！':'提交成功：请看老师反馈')+'</div>'}
document.getElementById("studentName").addEventListener("keydown",function(e){if(e.key==="Enter")confirmName()});
renderRosterOptions();renderBoard();
var client=mqtt.connect("wss://05d1d5baec9d4cb3a21f5517b430cff1.s1.eu.hivemq.cloud:8884/mqtt",{username:"classpro",password:"Classpro2026",clientId:"st_"+Math.random().toString(36).slice(2,10),reconnectPeriod:3000,connectTimeout:8000});
client.on("connect",function(){setStatus("connected room "+RM);client.subscribe("classpro/room/"+RM+"/question");client.subscribe("classpro/room/"+RM+"/scoreboard");publishPresence()});
client.on("message",function(topic,payload){try{var msg=JSON.parse(payload.toString());if(topic.indexOf("/scoreboard")>=0){scoreboard=msg;renderBoard();return}if(msg.lesson&&msg.lesson!==LESSON)return;current=msg;selected=null;chunks=[];answerChunks=[];matchLeft=null;matchRight=null;matchPairs={};render()}catch(e){console.log(e)}});
client.on("error",function(e){setStatus("connection error");console.log(e)});
client.on("close",function(){setStatus("disconnected")});
</script>
<script>
(function(){
  function speak(text,src){var fallback=function(){var say=function(){if(!window.speechSynthesis||!window.SpeechSynthesisUtterance)return;window.speechSynthesis.cancel();window.speechSynthesis.resume();var u=new SpeechSynthesisUtterance(String(text||''));u.lang='zh-CN';u.rate=.8;var vs=window.speechSynthesis.getVoices?window.speechSynthesis.getVoices():[];for(var i=0;i<vs.length;i++){if(/^zh[-_]CN/i.test(vs[i].lang)){u.voice=vs[i];break}}window.speechSynthesis.speak(u)};try{var cloud=new Audio('https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=zh-CN&q='+encodeURIComponent(String(text||'')));cloud.onerror=say;cloud.play().catch(say)}catch(e){say()}};if(src){try{var a=new Audio(src);a.onerror=fallback;a.play().catch(fallback);return}catch(e){}}fallback()}
  window.speak=speak;
  var previousPublish=publish;
  function addEnglishFeedback(){var box=document.querySelector('#app .ok,#app .bad');if(box&&!box.dataset.enFeedback){box.dataset.enFeedback='1';box.innerHTML+=(box.classList.contains('ok')?' / Submitted: Correct!':' / Submitted: Incorrect. Please review.')}}
  publish=function(ans,idx){previousPublish(ans,idx);addEnglishFeedback()};
  var previousMatching=submitMatching;
  submitMatching=function(){previousMatching();addEnglishFeedback()};
  var previousRender=render;
  render=function(){
    if(current&&current.mode==="pinyin"){
      var d=qdata(), opts=d.options||[], prompt=d.prompt||d.prompt_pinyin||"";
      var h='<div class="prompt">'+es(current.question.prompt_cn||"Listen and choose the correct pinyin.")+'<br><span class="english">'+es(current.question.prompt_en||"Listen and choose the correct pronunciation.")+'</span></div>';
      h+='<div class="hint"><div class="pinyin" style="font-size:28px;color:#203421">'+es(prompt)+'</div><button type="button" style="padding:9px 14px;font-size:14px" onclick="speak('+JSON.stringify(prompt)+')">🔊 Listen</button></div>';
      var pys=d.options_pinyin||[], oh='<div class="options">';opts.forEach(function(o,i){var rot=[-2,1.5,-1,2,0.5,-1.5][i%6],dy=[0,10,-6,6,-10,4][i%6];oh+='<button class="option '+(selected===i?'sel':'')+'" onclick="pick('+i+')" style="transform:translateY('+dy+'px) rotate('+rot+'deg)">'+es(pys[i]||o)+'</button>'});oh+='</div><button style="width:100%;margin-top:16px" onclick="submitChoice()" '+(selected==null?'disabled':'')+'>提交 Submit</button>';h+=oh;
      document.getElementById("app").innerHTML=h;
      return;
    }
    previousRender();
  };
  var previousPracticeRender=render;
  render=function(){
    previousPracticeRender();
    if(!current||current.phase!=='published'||current.mode!=='v1')return;
    var app=document.getElementById('app'),d=qdata(),ans='';
    ans=current.answerKey||'';
    if(!ans&&typeof d.correct_index==='number'&&d.options&&d.options[d.correct_index]!=null)ans=d.options[d.correct_index];
    if(!ans)ans=current.question.correct_answer||'';
    var note=document.createElement('div');
    note.className='ok';
    note.style.marginBottom='14px';
    note.innerHTML='答题结束，答案：<b>'+es(ans)+'</b>';
    app.insertBefore(note,app.firstChild);
    app.querySelectorAll('button').forEach(function(btn){btn.disabled=true;btn.style.pointerEvents='none';btn.style.opacity='.72'});
  };
})();
</script>
<script>
(function(){
  var oldRender=render;
  render=function(){

<script>
(function(){
  var previousRender=render;
  function publishedNote(){
    if(!current||current.phase!=='published')return;
    var d=qdata(),ans=current.answerKey||'';
    if(!ans&&((current.mode==='v7'||current.mode==='v8')&&d.pairs))ans=d.pairs.map(function(p){return p.left+'：'+p.right}).join('；');
    if(!ans&&typeof d.correct_index==='number'&&d.options)ans=d.options[d.correct_index]||'';
    if(!ans)ans=current.question.correct_answer||'';
    var app=document.getElementById('app'),note=document.createElement('div');
    note.className='ok';note.style.marginBottom='14px';note.innerHTML='答题结束，答案：<b>'+es(ans)+'</b>';
    app.insertBefore(note,app.firstChild);
    app.querySelectorAll('button').forEach(function(btn){btn.disabled=true;btn.style.pointerEvents='none';btn.style.opacity='.72'});
  }
  render=function(){
    if(!current||['v4','v7','g1'].indexOf(current.mode)<0){previousRender();return}
    var q=current.question||{},d=qdata(),mode=current.mode,h='<div class="prompt">'+es(q.prompt_cn||'')+'<br><span class="english">'+es(q.prompt_en||'')+'</span></div>';
    if(mode==='v4'){
      h+='<div class="hint"><div class="muted">Transform the sentence.</div><div class="pinyin">'+es(d.source_pinyin||d.template_pinyin||'')+'</div><div class="hanzi">'+es(d.source_sentence||d.template||'')+'</div></div>'+optionGrid(d.options||[],true);
    }else if(mode==='v7'&&d.pairs){
      var pairs=d.pairs||[],order=d.order||pairs.map(function(_,i){return i}),done=Object.keys(matchPairs).length;
      h+='<div style="text-align:center;font-weight:900;color:#3f7f32;margin-bottom:8px">词句匹配 / Word–Sentence Match</div><div class="muted" style="text-align:center">先点左侧回答，再点右侧问题。 '+done+' / '+pairs.length+'</div><div class="match-board"><div class="match-col">';
      pairs.forEach(function(p,i){var cls=matchPairs[i]!=null?' done':matchLeft===i?' sel':'';h+='<button class="match-card'+cls+'" onclick="pickMatch(\'L\','+i+')"><span class="py">'+es(p.left_pinyin||py(p.left))+'</span>'+es(p.left)+'</button>'});
      h+='</div><div class="match-col">';
      order.forEach(function(idx){var p=pairs[idx]||{},used=false;for(var k in matchPairs){if(matchPairs[k]===idx)used=true}var cls=used?' done':matchRight===idx?' sel':'';h+='<button class="match-card'+cls+'" onclick="pickMatch(\'R\','+idx+')" style="font-size:17px;line-height:1.45">'+es(p.right||'')+'</button>'});
      h+='</div></div><button style="width:100%;margin-top:18px" onclick="submitMatching()" '+(done<pairs.length?'disabled':'')+'>提交 Submit</button>';
    }else if(mode==='v7'){
      previousRender();return;
    }else if(mode==='g1'){
      if(!chunks.length){var cps=d.chunks_pinyin||[];chunks=(d.chunks||[]).map(function(t,i){return{id:i,t:t,p:cps[i]||py(t),u:false}}).sort(function(){return Math.random()-.5});answerChunks=[]}
      h+='<div class="chunks">';chunks.forEach(function(c,i){if(!c.u)h+='<div class="chunk" onclick="moveChunk('+i+')"><span class="py">'+es(c.p||py(c.t))+'</span>'+es(c.t)+'</div>'});h+='</div><div class="chunks answer">';
      if(!answerChunks.length)h+='<span class="muted">点击上面的词块</span>';answerChunks.forEach(function(c,i){h+='<div class="chunk" onclick="backChunk('+i+')"><span class="py">'+es(c.p||py(c.t))+'</span>'+es(c.t)+'</div>'});
      h+='</div><button style="width:100%;margin-top:16px" onclick="submitOrdering()" '+(!answerChunks.length?'disabled':'')+'>提交 Submit</button>';
    }
    document.getElementById('app').innerHTML=h;
    publishedNote();
  };
})();
</script>

<script>
/* L03 pilot: student renderer for the five-round character-recognition cycle. */
(function(){
  var HR=window.LESSON_DATA&&window.LESSON_DATA.hanziRecognition||{};
  var hrecAnswers=[],lastHrecId='';
  function hrecQuestion(){return current&&current.mode==='hrec'?current.question:null}
  function hrecOption(item,j){var img=(item.option_images||[])[j]||'';return img?'<img src="'+es(img)+'" alt="" style="width:100%;height:74px;object-fit:contain;border-radius:10px;background:#fff">':es((item.options||[])[j]||'')}
  function hrecReady(items){for(var i=0;i<items.length;i++)if(typeof hrecAnswers[i]!=='number')return false;return items.length>0}
  function renderHrec(){var q=hrecQuestion();if(!q)return;var d=q.data||{},items=d.items||[];if(lastHrecId!==q.id){lastHrecId=q.id;hrecAnswers=[]}var h='<div class="prompt">'+es(q.prompt_cn||'汉字认读循环')+'<br><span class="english">'+es(q.prompt_en||'Character Recognition Cycle')+'</span></div><div class="hint" style="text-align:center"><b>一次完成这一组6个词，再提交答案。</b><br><span class="muted">Complete all six items, then submit.</span></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px">';for(var i=0;i<items.length;i++){var x=items[i],round=d.roundId||'',stim='';if(round==='picture_to_hanzi')stim=x.image?'<img src="'+es(x.image)+'" alt="" style="width:100%;height:120px;object-fit:contain;border-radius:12px;background:#fff">':'<div style="font-size:18px;color:#74806d">'+es(x.meaning||'')+'</div>';else if(round==='hanzi_to_picture')stim='<div class="hanzi" style="font-size:42px">'+es(x.stimulus||x.word)+'</div>';else stim='<div class="hanzi" style="font-size:34px">'+es(x.stimulus||x.word)+'</div>'+((round==='sentence_to_word')?'<div class="pinyin" style="font-size:14px">'+es(x.pinyin||'')+'</div>':'');h+='<div style="padding:14px;border:1px solid #dfeac8;border-radius:16px;background:#fff"><div style="min-height:126px;display:flex;align-items:center;justify-content:center">'+stim+'</div><div class="options" style="grid-template-columns:repeat(2,minmax(0,1fr));gap:8px">';for(var j=0;j<(x.options||[]).length;j++){var sel=hrecAnswers[i]===j;h+='<button class="option '+(sel?'sel':'')+'" onclick="chooseHrec('+i+','+j+')" style="min-height:62px;transform:none">'+hrecOption(x,j)+'</button>'}h+='</div></div>'}h+='</div><button style="width:100%;margin-top:18px" onclick="submitHrec()" '+(!hrecReady(items)?'disabled':'')+'>提交本组 Submit Group</button>';if(current.phase==='published'){var key=current.answerKey||q.correct_answer||'';h='<div class="ok" style="margin-bottom:14px">本轮答案 / Key：<b>'+es(key)+'</b></div>'+h}document.getElementById('app').innerHTML=h;if(current.phase==='published')document.querySelectorAll('#app button').forEach(function(b){b.disabled=true;b.style.pointerEvents='none';b.style.opacity='.72'})}
  window.chooseHrec=function(i,j){hrecAnswers[i]=j;render()};
  window.submitHrec=function(){var q=hrecQuestion(),items=(q.data||{}).items||[],answers=hrecAnswers.map(function(j,i){return(items[i].options||[])[j]||''}),ok=answers.length===items.length&&answers.every(function(a,i){return a===items[i].answer}),payload={room:RM,lesson:LESSON,studentName:name(),name:name(),answer:answers.join('；'),text:answers.join('；'),questionId:q.id,mode:'hrec',autoResult:ok?'correct':'wrong',submittedAt:new Date().toISOString()};client.publish('classpro/room/'+RM+'/answers',JSON.stringify(payload));document.getElementById('app').innerHTML='<div class="'+(ok?'ok':'bad')+'">'+(ok?'提交成功：本组全部正确！':'已提交，请看教师公布答案。')+'</div>'};
  var oldRender=render;render=function(){if(current&&current.mode==='hrec'){renderHrec();return}oldRender()};
})();
</script>
<script>
/* L05 feedback pass: show sentence-transformation pinyin above each character. */
(function(){
  function rubyLine(text,pinyin,size){
    var syl=String(pinyin||'').replace(/[.,!?;:，。？！；：]/g,' ').split(/\s+/).filter(Boolean),si=0;
    return Array.from(String(text||'')).map(function(ch){
      if(/[\s，。？！；：,.!?;:]/.test(ch))return '<span>'+es(ch)+'</span>';
      var rt=syl[si++]||'';
      return '<ruby style="display:inline-flex;flex-direction:column-reverse;align-items:center;margin:0 2px;font-size:'+(size||24)+'px;line-height:1.15"><rt style="font-size:11px;color:#78836f;font-weight:700;line-height:1.1">'+es(rt)+'</rt><span>'+es(ch)+'</span></ruby>';
    }).join('');
  }
  var prevRender=render;
  render=function(){
    if(!current||current.mode!=='v4'){prevRender();return}
    var q=current.question||{},d=qdata(),h='<div class="prompt">'+es(q.prompt_cn||'')+'<br><span class="english">'+es(q.prompt_en||'')+'</span></div>';
    h+='<div class="hint"><div class="muted">Transform the sentence.</div><div class="hanzi">'+rubyLine(d.source_sentence||d.template||'',d.source_pinyin||d.template_pinyin||'',26)+'</div></div><div class="options">';
    (d.options||[]).forEach(function(o,i){var sel=selected===i,opy=(d.options_pinyin||[])[i]||py(o);h+='<button class="option '+(sel?'sel':'')+'" onclick="pick('+i+')" style="min-width:210px;transform:none">'+rubyLine(o,opy,20)+'</button>'});
    h+='</div><button style="width:100%;margin-top:16px" onclick="submitChoice()" '+(selected==null?'disabled':'')+'>提交 Submit</button>';
    document.getElementById('app').innerHTML=h;
  };
})();
</script>
