<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese ClassPro+</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.0/mqtt.min.js"></script>
<script src="../shared/students.js"></script>
<script src="../shared/context.js"></script>
<script src="../data-model/course-data-adapter.js"></script>
<script src="./lesson-data-loader.js?v=20260723-l04-images-5"></script>
<script src="./pinyin-lab.js"></script>
<style>
:root{--teach:#4A8FE7;--practice:#E8563A;--battle:#E8563A;--blue:#4A8FE7;--green:#5CC98C;--bg:#FAFAF7;--text:#1A1A2E;--sidebar-bg:#F5F4F0;--line:#E8E6E1;--primary:#E8563A}
*{box-sizing:border-box}
body{font-family:Nunito,Helvetica Neue,sans-serif;background:var(--bg);margin:0;color:var(--text)}
:root{--hanzi-font:KaiTi,STKaiti,"Kaiti SC","楷体","Microsoft YaHei",serif}
.wc-word,.vocab-hanzi,.text-hanzi,.option-hanzi,.chunk-btn,.chunk,.hanzi-font{font-family:var(--hanzi-font)}
#app{min-height:100vh}
.cp-sidebar{position:fixed;left:0;top:0;bottom:0;width:56px;background:var(--sidebar-bg);border-right:0.5px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:10px 0;z-index:80}
.cp-sidebar .cp-logo{width:32px;height:32px;border-radius:8px;background:var(--primary);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;cursor:pointer}
.cp-sidebar .sb-btn{width:38px;height:38px;border-radius:10px;border:none;background:transparent;font-size:15px;color:#bbb;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cp-sidebar .sb-btn.active{background:#fff;border:1.5px solid var(--primary);color:var(--primary);font-weight:700}
.cp-sidebar .sb-spacer{flex:1}
.cp-sidebar .sb-bottom{font-size:13px;color:#ccc;cursor:pointer;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative}
.cp-sidebar .sb-dot{position:absolute;top:-1px;right:-1px;width:6px;height:6px;border-radius:50%;background:var(--green);border:1.5px solid var(--sidebar-bg)}
.cp-body{margin-left:56px;min-height:100vh;display:flex;flex-direction:column}
.home-screen{min-height:calc(100vh - 80px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.home-title{font-size:36px;font-weight:900;color:var(--primary);margin-bottom:8px}
.home-lesson{font-size:20px;color:#888;margin-bottom:40px}
.home-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px;width:100%}
.home-card{padding:35px 20px;border-radius:20px;cursor:pointer;text-align:center;transition:.3s;box-shadow:0 4px 18px rgba(0,0,0,.04);border:1px solid var(--line)}
.home-card:hover{transform:translateY(-4px)}
.home-card .emoji{font-size:48px;margin-bottom:10px}
.home-card .label{font-size:18px;font-weight:800}
.home-card .desc{font-size:13px;margin-top:6px;opacity:.7}
.home-card.teach{background:#EDF3FF;color:#2D5DB8}
.home-card.practice{background:#FFF0EE;color:#C74B3F}
.home-card.battle{background:#E8F8EE;color:#1E6B3A}
.header{background:#fff;padding:8px 20px;border-bottom:0.5px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.header h1{margin:0;font-size:16px;color:var(--text);cursor:pointer;font-weight:700}
.header-right{display:flex;gap:6px;align-items:center}
.sub-nav{background:#fff;padding:8px 12px;border-bottom:0.5px solid var(--line);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sub-group{display:inline-flex;align-items:center;padding:5px 8px;border-radius:10px;background:#E6F1FB}
.sub-group-label{font-size:10px;font-weight:800;color:#0C447C;margin-right:4px}
.sub-btn{padding:4px 10px;font-size:12px;border:none;background:transparent;border-radius:16px;cursor:pointer;font-weight:600;color:#888}
.sub-btn.active{background:#fff;color:var(--text);box-shadow:0 0 0 0.5px rgba(0,0,0,.15)}
.grammar-tab{padding:5px 12px;font-size:12px;font-weight:600;border-radius:20px;cursor:pointer;border:1.5px solid var(--blue);background:#fff;color:var(--blue)}
.grammar-tab.active{background:var(--blue);color:#fff}
.timer-circle{width:80px;height:80px;border-radius:50%;background:linear-gradient(145deg,#fff,#f0f0f0);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;border:3px solid #e5e7eb}
.timer-ring{position:absolute;top:0;left:0;width:80px;height:80px}
.timer-ring circle{fill:none;stroke-width:4;stroke-linecap:round;transform:rotate(-90deg);transform-origin:center}
.timer-ring .bg{stroke:#e5e7eb}
.timer-ring .fg{stroke:var(--green);transition:stroke-dashoffset .3s}
.timer-ring .fg.warn{stroke:#fbbf24}
.timer-ring .fg.danger{stroke:var(--red);animation:pulse .5s infinite}
@keyframes pulse{50%{opacity:.4}}
.timer-num{font-size:26px;font-weight:900;color:var(--text);font-family:Courier New,monospace}
.timer-num.danger{color:var(--red);animation:pulse .5s infinite}
.timer-label{font-size:9px;color:#9ca3af}
.timer-preset{padding:4px 10px;border-radius:15px;border:2px solid #d1d5db;background:#fff;font-size:12px;font-weight:bold;cursor:pointer;color:#555}
.timer-preset.active{border-color:var(--green);background:#E8F6EE;color:var(--green)}
.timer-ctrl{padding:8px;border-radius:8px;border:none;font-weight:bold;cursor:pointer;font-size:13px;color:#fff}
.timer-ctrl.start{background:var(--green)}
.timer-ctrl.reset{background:#9ca3af}
.qw-bar{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:2px solid #93c5fd;border-radius:14px;padding:14px 18px;margin-bottom:15px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap}
.qw-btn{padding:8px 18px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;border:none;color:#fff}
.qw-btn.start{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.qw-btn.reset{background:#94a3b8}
.qw-btn.lock{background:linear-gradient(135deg,#f59e0b,#d97706)}
.main-content{flex:1;padding:16px 24px;display:flex;gap:15px;justify-content:center;max-width:1200px;margin:0 auto;width:100%}
.panel-area{flex:1;display:flex;flex-direction:column;align-items:center}
.panel{background:#fff;width:100%;padding:28px;border-radius:16px;border:0.5px solid var(--line)}
.word-card{background:#fff;border:2px solid #e5e7eb;border-radius:14px;padding:15px;text-align:center;cursor:pointer}
.word-card:hover{border-color:var(--blue)}
.word-card .wc-word{font-size:28px;font-weight:900;color:var(--text)}
.word-card .wc-pinyin{font-size:13px;color:#888}
.chunk-btn{padding:10px 18px;font-size:20px;font-weight:bold;background:#fff;border:2px solid #e0e0e0;border-radius:10px;cursor:pointer}
.chunk-btn.in-answer{background:#EDF3FF;border-color:var(--blue);color:#2D5DB8}
.next-btn{display:inline-block;padding:10px 22px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-weight:bold;font-size:14px;cursor:pointer;margin:5px}
.score-sidebar{position:fixed;right:0;top:0;bottom:0;width:230px;background:linear-gradient(180deg,#fff,#f8fafc);z-index:90;display:flex;flex-direction:column;transition:transform .3s}
.score-sidebar.closed{transform:translateX(100%)}
.score-sidebar-header{background:linear-gradient(135deg,#10b981,#059669);padding:14px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.score-sidebar-body{flex:1;overflow-y:auto;padding:10px 12px}
.score-row{display:flex;align-items:center;gap:5px;padding:6px 8px;border-radius:10px;font-size:12px}
.score-row:nth-child(1){background:linear-gradient(135deg,#fef3c7,#fde68a);font-weight:bold}
.score-row:nth-child(2){background:#f0f0f0;font-weight:bold}
.score-name{flex:1;overflow:hidden}
.score-pts{font-weight:900;color:var(--practice);min-width:22px;text-align:center}
.star-btn{width:100%;padding:12px;background:linear-gradient(135deg,#f59e0b,#eab308);color:#fff;font-weight:900;font-size:14px;cursor:pointer;border:none;margin-top:10px;border-radius:12px}
.star-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center}
.teach-nav{display:flex;gap:10px;justify-content:center;margin-top:20px;padding-top:15px;border-top:1px solid #eee}
.teach-nav button{padding:8px 16px;font-size:14px;font-weight:bold;border:none;border-radius:8px;cursor:pointer;color:#fff}
.teach-nav .prev{background:#9ca3af}
.teach-nav .next{background:var(--blue)}
.live-panel{width:350px;min-width:350px;background:#fff;display:flex;flex-direction:column;border-radius:16px;overflow:hidden}
.live-header{background:linear-gradient(135deg,#1A2980,#26D0CE);color:#fff;padding:12px 15px;display:flex;justify-content:space-between;align-items:center}
.answers-area{flex:1;padding:10px;overflow-y:auto}
.formula-box{background:#EDF3FF;border-radius:12px;padding:15px 20px;font-size:20px;font-weight:bold;color:#2D5DB8;text-align:center;margin:10px 0}
.example-row{padding:10px;margin:6px 0;background:#f9fafb;border-radius:8px;border-left:3px solid var(--teach)}
.example-row .cn{font-size:18px;font-weight:600;color:var(--text)}
.example-row .en{font-size:14px;color:#888;font-style:italic}
.pk-question-card{background:#fff;border:4px solid #ffd54f;border-radius:16px;padding:25px;width:100%;text-align:center;margin:15px 0}
.score-block{font-size:48px;font-weight:900;width:80px;text-align:center}
.chunk-bank{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;min-height:70px;margin-top:15px}

/* ClassPro+ lite classroom skin: visual-only first pass. */
:root{
--cp-primary:#E8563A;
--cp-primary-soft:#FFF0EC;
--cp-blue:#2F6FD6;
--cp-blue-soft:#EEF5FF;
--cp-green:#26A269;
--cp-green-soft:#EAF8EF;
--cp-ink:#151725;
--cp-muted:#6B7280;
--cp-soft:#F7F7F3;
--cp-card:#FFFFFF;
--cp-line:#E7E3DA;
--cp-shadow:0 18px 50px rgba(26,26,46,.08);
--bg:#F7F7F3;
--text:var(--cp-ink);
--primary:var(--cp-primary);
--blue:var(--cp-blue);
--green:var(--cp-green);
--line:var(--cp-line);
--sidebar-bg:#FFFFFF;
}
body{background:radial-gradient(circle at 18% 0,#fff7f2 0,#f7f7f3 32%,#f4f7fb 100%);font-family:"Segoe UI","Microsoft YaHei",Arial,sans-serif}
.cp-sidebar{width:72px;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-right:1px solid rgba(231,227,218,.9);padding:16px 0;box-shadow:8px 0 28px rgba(21,23,37,.04)}
.cp-sidebar .cp-logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#e8563a,#ff8a66);font-size:15px;font-weight:900;box-shadow:0 12px 26px rgba(232,86,58,.22)}
.cp-sidebar .sb-btn{width:46px;height:46px;border-radius:14px;margin:3px 0;color:#8b8f9b;font-weight:800;background:#fff;border:1px solid transparent}
.cp-sidebar .sb-btn:hover,.cp-sidebar .sb-bottom:hover{background:#FFF7F4;color:var(--cp-primary)}
.cp-sidebar .sb-btn.active{background:var(--cp-primary-soft);border:1px solid rgba(232,86,58,.35);color:var(--cp-primary);box-shadow:0 8px 20px rgba(232,86,58,.10)}
.cp-sidebar .sb-bottom{width:44px;height:38px;border-radius:13px;color:#9CA3AF;font-weight:800}
.cp-body{margin-left:72px}
.header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);backdrop-filter:blur(18px);padding:14px 28px;border-bottom:1px solid rgba(231,227,218,.85)}
.header h1{font-size:18px;font-weight:900;color:var(--cp-ink)}
.header h1 span{display:inline-flex;margin-left:10px;padding:4px 10px;border-radius:999px;background:var(--cp-blue-soft);color:var(--cp-blue);font-size:12px;font-weight:800;vertical-align:middle}
.header-right>button{border-radius:12px!important;border:1px solid var(--cp-line)!important;background:#fff!important;box-shadow:0 6px 14px rgba(21,23,37,.05)}
.sub-nav{position:sticky;top:61px;z-index:45;justify-content:center;background:rgba(247,247,243,.88);backdrop-filter:blur(18px);padding:12px 20px;border-bottom:0}
.sub-btn{padding:9px 17px;border-radius:999px;background:#fff;border:1px solid var(--cp-line);color:#6b7280;font-size:14px}
.sub-btn.active{background:var(--cp-ink);color:#fff;box-shadow:0 10px 24px rgba(21,23,37,.16)}
.sub-group{background:#fff;border:1px solid var(--cp-line);border-radius:999px;padding:4px}
.sub-group-label{padding:0 8px;color:#748095}
.main-content{max-width:1280px;padding:28px 32px 36px;gap:20px;align-items:flex-start}
.panel-area{min-width:0}
.panel{background:rgba(255,255,255,.94);border:1px solid rgba(231,227,218,.95);border-radius:8px;box-shadow:var(--cp-shadow);padding:32px}
.home-screen{min-height:100vh;padding:52px 28px;background:linear-gradient(135deg,#fff7f2 0,#f7f7f3 48%,#eef5ff 100%)}
.home-title{font-size:42px;color:var(--cp-ink);letter-spacing:0}
.home-title::after{content:"+";color:var(--cp-primary);margin-left:2px}
.home-lesson{color:#616978}
.home-card{border-radius:8px;background:#fff!important;border:1px solid rgba(231,227,218,.95);box-shadow:var(--cp-shadow);color:var(--cp-ink)!important}
.home-card:hover{transform:translateY(-3px);box-shadow:0 22px 58px rgba(26,26,46,.12)}
.grammar-tab{border:1px solid var(--cp-line);background:#fff;color:#667085;border-radius:999px;padding:8px 14px;font-size:13px}
.grammar-tab.active{background:var(--cp-blue);border-color:var(--cp-blue);color:#fff}
.teach-nav{border-top:1px solid var(--cp-line);padding-top:18px}
.teach-nav button,.next-btn{border-radius:999px;padding:10px 20px;box-shadow:none}
.teach-nav .next,.next-btn{background:var(--cp-blue)}
.teach-nav .prev{background:#8B95A5}
.qw-bar{margin:16px 32px 0;border:1px solid #bfd4f8;background:linear-gradient(135deg,#f5f9ff,#eaf2ff);border-radius:8px;box-shadow:0 10px 28px rgba(47,111,214,.08)}
.live-panel{border-radius:8px;border:1px solid var(--cp-line);box-shadow:var(--cp-shadow)}
.live-header{background:linear-gradient(135deg,#2f6fd6,#66b8d9)}
.score-sidebar{box-shadow:-12px 0 34px rgba(21,23,37,.12);border-left:1px solid var(--cp-line)}
.chunk-btn{border-radius:8px;border:1px solid var(--cp-line);box-shadow:0 6px 14px rgba(21,23,37,.05)}
.chunk-btn.in-answer{background:var(--cp-blue-soft);border-color:#a9c5f5;color:var(--cp-blue)}
.pk-question-card{border-radius:8px}
@media(max-width:820px){
.cp-sidebar{width:56px}
.cp-body{margin-left:56px}
.main-content{padding:18px 12px;flex-direction:column}
.home-cards{grid-template-columns:1fr}
.panel{padding:20px}
.live-panel{width:100%;min-width:0}
.sub-nav{top:57px;justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}
}

/* ClassPro+ stage skin: bolder projection-first pass. */
:root{
--stage-red:#F05A3F;
--stage-red-2:#FF8B66;
--stage-blue:#2563D8;
--stage-cyan:#46B9D8;
--stage-yellow:#FFD166;
--stage-ink:#101321;
--stage-paper:#FFFDF8;
--stage-shadow:0 28px 80px rgba(16,19,33,.16);
}
body{
background:
radial-gradient(circle at 8% 10%,rgba(255,139,102,.28) 0,rgba(255,139,102,0) 30%),
radial-gradient(circle at 88% 16%,rgba(70,185,216,.25) 0,rgba(70,185,216,0) 32%),
linear-gradient(135deg,#fffaf4 0,#f4f7ff 54%,#fff7f1 100%);
}
.cp-sidebar{
background:linear-gradient(180deg,#161927,#22263a);
border-right:0;
box-shadow:14px 0 34px rgba(16,19,33,.18);
}
.cp-sidebar .cp-logo{
background:linear-gradient(135deg,var(--stage-red),var(--stage-yellow));
color:#171827;
font-weight:1000;
}
.cp-sidebar .sb-btn,.cp-sidebar .sb-bottom{background:rgba(255,255,255,.06);color:rgba(255,255,255,.62)}
.cp-sidebar .sb-btn.active{
background:#fff;
color:var(--stage-red);
border-color:#fff;
box-shadow:0 12px 30px rgba(255,255,255,.18);
}
.cp-sidebar .sb-btn:hover,.cp-sidebar .sb-bottom:hover{background:rgba(255,255,255,.14);color:#fff}
.header{
background:linear-gradient(135deg,rgba(16,19,33,.96),rgba(35,39,60,.94));
border-bottom:0;
box-shadow:0 18px 42px rgba(16,19,33,.18);
}
.header h1{color:#fff;font-size:20px;letter-spacing:.2px}
.header h1 span{
background:rgba(255,255,255,.12);
color:#fff;
border:1px solid rgba(255,255,255,.18);
}
.header-right{color:rgba(255,255,255,.72)}
.header-right>button{
background:rgba(255,255,255,.12)!important;
border:1px solid rgba(255,255,255,.18)!important;
color:#fff!important;
}
.sub-nav{
top:69px;
background:rgba(255,253,248,.78);
border-bottom:1px solid rgba(255,255,255,.6);
box-shadow:0 12px 32px rgba(16,19,33,.06);
}
.sub-btn{font-size:15px;padding:10px 20px;border:0;background:#fff;box-shadow:0 8px 18px rgba(16,19,33,.07)}
.sub-btn.active{background:linear-gradient(135deg,var(--stage-red),var(--stage-red-2));box-shadow:0 14px 28px rgba(240,90,63,.26)}
.main-content{max-width:1380px;padding:34px 42px 42px}
.panel{
position:relative;
overflow:hidden;
border:0;
border-radius:22px;
box-shadow:var(--stage-shadow);
background:rgba(255,253,248,.94);
}
.panel::before{
content:"";
position:absolute;
inset:0 0 auto 0;
height:7px;
background:linear-gradient(90deg,var(--stage-red),var(--stage-yellow),var(--stage-cyan),var(--stage-blue));
}
.panel h2,.panel h3{font-size:28px!important;color:var(--stage-ink)!important;letter-spacing:.2px}
.home-screen{
position:relative;
overflow:hidden;
background:
radial-gradient(circle at 20% 20%,rgba(255,209,102,.42) 0,rgba(255,209,102,0) 28%),
radial-gradient(circle at 82% 18%,rgba(37,99,216,.22) 0,rgba(37,99,216,0) 34%),
linear-gradient(135deg,#151827 0,#20243a 52%,#f05a3f 160%);
color:#fff;
}
.home-screen::before{
content:"Chinese ClassPro+";
position:absolute;
right:-40px;
bottom:18px;
font-size:110px;
font-weight:1000;
letter-spacing:-1px;
color:rgba(255,255,255,.055);
white-space:nowrap;
}
.home-title{
position:relative;
font-size:68px;
line-height:1;
color:#fff;
text-shadow:0 16px 42px rgba(0,0,0,.25);
}
.home-title::after{color:var(--stage-yellow)}
.home-lesson{position:relative;color:rgba(255,255,255,.78);font-size:24px;margin-bottom:48px}
.home-cards{position:relative;max-width:920px;gap:24px}
.home-card{
padding:34px 26px 30px;
border-radius:24px;
border:1px solid rgba(255,255,255,.28);
background:rgba(255,255,255,.95)!important;
box-shadow:0 26px 70px rgba(0,0,0,.24);
}
.home-card .emoji{font-size:62px;margin-bottom:16px}
.home-card .label{font-size:24px}
.home-card .desc{font-size:15px}
.home-card.teach{box-shadow:0 26px 70px rgba(37,99,216,.30)}
.home-card.practice{box-shadow:0 26px 70px rgba(240,90,63,.30)}
.home-card.battle{box-shadow:0 26px 70px rgba(38,162,105,.26)}
.home-card:hover{transform:translateY(-8px) scale(1.015)}
.grammar-tab{font-size:14px;padding:9px 16px}
.grammar-tab.active{background:linear-gradient(135deg,var(--stage-blue),var(--stage-cyan));border-color:transparent}
.teach-nav{margin-top:26px;padding-top:22px}
.teach-nav button,.next-btn{font-size:16px;padding:12px 24px}
.live-panel{border:0;border-radius:22px;box-shadow:var(--stage-shadow)}
.live-header{background:linear-gradient(135deg,#151827,#2563d8)}
.qw-bar{border:0;border-radius:20px;background:linear-gradient(135deg,#fff,#eaf4ff);box-shadow:0 18px 42px rgba(37,99,216,.14)}
.chunk-btn{font-size:22px;border-radius:16px;padding:14px 22px}
.score-sidebar{background:#fffdf8}

/* Turn vocabulary into a real classroom stage without touching JS. */
.panel[style*="max-width:960px"]{
max-width:1120px!important;
padding:42px!important;
background:
linear-gradient(135deg,rgba(255,255,255,.96),rgba(255,250,244,.96));
}
.panel[style*="max-width:960px"]>div:first-child{
display:grid!important;
grid-template-columns:minmax(300px,380px) 1fr!important;
gap:44px!important;
align-items:center!important;
}
.panel[style*="max-width:960px"]>div:first-child>div:first-child{
width:360px!important;
height:360px!important;
border-radius:34px!important;
border:8px solid #fff!important;
box-shadow:0 28px 70px rgba(16,19,33,.18)!important;
background:linear-gradient(135deg,#fff3e8,#eaf4ff)!important;
}

    var i=this.w1i,c=qs[i];if(!c||!c.data)return'<div class="panel"><p>暂无题目</p></div>';
    var body='<div style="text-align:center;background:#f8faf3;border:1px solid #dfeac8;border-radius:16px;padding:24px;margin:12px 0"><div style="font-size:16px;color:#74806d;margin-bottom:6px">'+es(c.data.sentence_pinyin||'')+'</div><div class="hanzi-font" style="font-size:34px;font-weight:900;color:var(--text);line-height:1.5">'+es(c.data.sentence||'')+'</div><div style="font-size:13px;color:#888;margin-top:8px">选择正确的汉字。Choose the correct character.</div></div>';
    var nav=this._navBtn('ap.w1i=Math.max(0,ap.w1i-1);ap.w1a=false;ap.w1p=-1;ap._r()','ap.w1i=Math.min('+(qs.length-1)+',ap.w1i+1);ap.w1a=false;ap.w1p=-1;ap._r()',i,qs.length,'&larr; 上一题','下一题 &rarr;');
    return this._mc('汉字区辨 / Character Check',c,c.data.options,c.data.correct_index,this.w1p,this.w1a,'ap.w1p=',body,nav);
  };
  var oldCq=ap._cq;
  ap._cq=function(){
    if(this.st==='w1'){var q=(Q.w1_component_char||[])[this.w1i];return q||null}
    return oldCq.call(this);
  };
})();
</script>
<script>
/* HREC sync guard: keep the character-recognition publish path explicit. */
(function(){
  if(typeof HR==='undefined'||!HR.enabled||typeof window.buildHanziRecognitionQuestion!=='function')return;
  var previousQws=ap.qws,previousQwe=ap.qwe;
  function publishHrec(state){
    var q=window.buildHanziRecognitionQuestion(state.hri||0);
    if(!q||!state.mq||state.cs!=='connected')return false;
    var payload={room:RM,lesson:MT.lessonKey||'HSK1-L02',mode:'hrec',duration:state.qtm,sentAt:new Date().toISOString(),phase:state.qp,question:q};
    if(state.qp==='published'){
      payload.answerKey=(q.data&&q.data.items||[]).map(function(x){return x.answer}).join('、');
      payload.publishedAt=new Date().toISOString();
    }
    state.lastQuestionPayload=payload;state.currentQuestionId=q.id;
    state.mq.publish('classpro/room/'+RM+'/question',JSON.stringify(payload));
    return true;
  }
  ap.qws=function(){
    if(this.mt==='practice'&&this.st==='hrec'){
      clearInterval(this.qtint);this.qp='answering';this.qt=0;this.qsub={};
      publishHrec(this);this._r();return;
    }
    previousQws.call(this);
  };
  ap.qwe=function(){
    if(this.mt==='practice'&&this.st==='hrec'){
      clearInterval(this.qtint);this.qp='published';this.qsub={};
      publishHrec(this);this._saveClassData();this._pubBoard();this._r();return;
    }
    previousQwe.call(this);
  };
})();
</script>
