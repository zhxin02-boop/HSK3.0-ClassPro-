<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">Mandarin initial tongue positions</title>
  <desc id="desc">Simple diagram showing front, blade and retroflex tongue positions.</desc>
  <rect width="900" height="300" rx="24" fill="#f8faf3"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(150 150)"><ellipse rx="105" ry="78" fill="#fff" stroke="#bfd99b" stroke-width="4"/><path d="M-68 20 Q0 76 68 20" fill="none" stroke="#d77b70" stroke-width="18" stroke-linecap="round"/><path d="M-48 -20 Q0 -48 48 -20" fill="none" stroke="#9bb8df" stroke-width="12" stroke-linecap="round"/><text y="112" fill="#30422c" font-size="23">Front tongue</text><text y="139" fill="#71806b" font-size="16">j · q · x</text></g>
    <g transform="translate(450 150)"><ellipse rx="105" ry="78" fill="#fff" stroke="#bfd99b" stroke-width="4"/><path d="M-68 20 Q0 76 68 20" fill="none" stroke="#d77b70" stroke-width="18" stroke-linecap="round"/><path d="M-8 10 Q10 -2 30 -28" fill="none" stroke="#9bb8df" stroke-width="12" stroke-linecap="round"/><text y="112" fill="#30422c" font-size="23">Tongue blade</text><text y="139" fill="#71806b" font-size="16">z · c · s</text></g>
    <g transform="translate(750 150)"><ellipse rx="105" ry="78" fill="#fff" stroke="#bfd99b" stroke-width="4"/><path d="M-68 20 Q0 76 68 20" fill="none" stroke="#d77b70" stroke-width="18" stroke-linecap="round"/><path d="M-35 -5 Q10 35 48 -18" fill="none" stroke="#9bb8df" stroke-width="12" stroke-linecap="round"/><text y="112" fill="#30422c" font-size="23">Retroflex</text><text y="139" fill="#71806b" font-size="16">zh · ch · sh · r</text></g>
  </g>
</svg>
