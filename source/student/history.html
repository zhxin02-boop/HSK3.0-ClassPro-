<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>学生历史趋势与阶段报告</title><script src="../shared/students.js"></script><script src="../data-model/hsk1-curriculum.js"></script>
<style>*{box-sizing:border-box}body{margin:0;padding:18px;background:#f8f7fb;color:#29233a;font-family:Arial,"Microsoft YaHei",sans-serif}.wrap{max-width:900px;margin:auto}.hero,.panel,.lesson,.block{background:#fff;border:1px solid #e5def7;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 10px 25px rgba(75,54,120,.08)}h1{margin:0 0 6px;color:#5847bc;font-size:25px}.muted{color:#817894;font-size:13px;line-height:1.55}.namebar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}select,button{padding:10px 13px;border-radius:999px;border:1px solid #d8cff5;background:#fff;font-size:14px;font-weight:800}select{min-width:250px}button{background:#6c5ce7;color:#fff;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.kpi{background:#f7f5ff;border-radius:14px;padding:12px;text-align:center}.kpi b{display:block;font-size:23px;color:#5847bc}.kpi span{font-size:11px;color:#817894}.lesson{display:flex;justify-content:space-between;gap:14px;align-items:center}.lesson h3,.block h2{margin:0 0 4px;color:#44368f}.lesson .score{font-size:22px;font-weight:900;color:#5847bc;white-space:nowrap}.block{border-left:6px solid #6c5ce7}.empty{text-align:center;padding:28px;color:#817894;border:1px dashed #d8cff5;border-radius:16px}@media(max-width:650px){.grid{grid-template-columns:repeat(2,1fr)}.lesson{display:block}.lesson .score{margin-top:8px}}
</style></head><body><main class="wrap">
<section class="hero"><h1>历史趋势与阶段报告</h1><div class="muted">History & 5-Lesson Reports · 选择姓名后查看自己的成长轨迹。</div><div class="namebar"><select id="studentName"><option value="">Select your name / 选择姓名</option></select><button onclick="loadHistory()">查看报告 / View Report</button><a href="index.html" style="color:#5847bc;font-weight:900;text-decoration:none">返回学生界面</a></div></section>
<div id="app"><div class="empty">请选择姓名后查看。</div></div>
</main><script>
var GAS="https://script.google.com/macros/s/AKfycbxrCd6f6cQ3wocXYQZyLKY0JutolEmOWWzTGOABnnHHJOm697OfyBlkLw-SQ-u-9ZAO/exec";
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function val(x,keys){for(var i=0;i<keys.length;i++){if(x&&x[keys[i]]!=null&&x[keys[i]]!=="")return x[keys[i]]}return""}
function dataVal(x,keys,index){var v=val(x,keys);if(v!=="")return v;if(x&&x.__values&&x.__values[index]!=null)return x.__values[index];return""}
function courseId(x){var l=String(dataVal(x,["课程","lesson"],2)||"");if(/^HSK1-L\d+$/i.test(l))return l.toUpperCase();var m=l.match(/(?:lesson|l)\s*(\d+)/i);if(m)return"HSK1-L"+String(m[1]).padStart(2,"0");return l}
function stage(x){var s=String(dataVal(x,["环节","stage"],3)||"").toLowerCase();return s==="预习"||s==="课前"||s==="pre_class"?'课前':s==="课中"||s==="in_class"?'课中':s==="课后"||s==="post_class"?'课后':"其他"}
function init(){var el=document.getElementById("studentName");el.innerHTML='<option value="">Select your name / 选择姓名</option>'+(window.CLASS_STUDENTS||[]).map(function(n){return'<option value="'+esc(n)+'">'+esc(n)+'</option>'}).join("")}
function loadHistory(){var name=document.getElementById("studentName").value;if(!name){alert("请先选择姓名");return}document.getElementById("app").innerHTML='<div class="empty">正在读取学习记录...</div>';fetch(GAS+"?action=get_all").then(function(r){return r.json()}).then(function(d){var rows=[];if(d&&d.data){for(var k in d.data)(d.data[k]||[]).forEach(function(x){rows.push(x)})}rows=rows.filter(function(x){return String(dataVal(x,["姓名","studentName","name"],1))===name});renderHistory(rows,name)}).catch(function(){document.getElementById("app").innerHTML='<div class="empty">暂时无法读取报告，请稍后重试。</div>'})}
function renderHistory(rows,name){var courses=window.HSK1_CURRICULUM||[],by={};rows.forEach(function(x){var id=courseId(x);if(!id)return;if(!by[id])by[id]={rows:[],score:0,total:0,correct:0,mid:0,pre:0,post:0};var a=by[id],sc=Number(dataVal(x,["得分","score"],6))||0,tt=Number(dataVal(x,["总分","total"],7))||0;a.rows.push(x);a.score+=sc;a.total+=tt;if(stage(x)==="课前")a.pre++;if(stage(x)==="课中"){a.mid++;if(String(dataVal(x,["结果","result","autoResult"],14)).toLowerCase()==="correct"||tt>0&&sc===tt)a.correct++}if(stage(x)==="课后")a.post++});var all=Object.keys(by).sort(),score=all.reduce(function(s,id){return s+by[id].score},0),total=all.reduce(function(s,id){return s+by[id].total},0),mid=all.reduce(function(s,id){return s+by[id].mid},0),correct=all.reduce(function(s,id){return s+by[id].correct},0);var h='<section class="panel"><h2 style="margin:0 0 12px;color:#44368f">'+esc(name)+' 的学习概览</h2><div class="grid"><div class="kpi"><b>'+all.length+'</b><span>已有记录课程</span></div><div class="kpi"><b>'+score+'/'+total+'</b><span>累计得分</span></div><div class="kpi"><b>'+ (total?Math.round(score/total*100):0)+'%</b><span>累计准确率</span></div><div class="kpi"><b>'+ (mid?Math.round(correct/mid*100):0)+'%</b><span>课中正确率</span></div></div></section>';h+='<section class="panel"><h2 style="margin:0 0 12px;color:#44368f">课程历史趋势</h2>'+(all.length?all.map(function(id){var a=by[id],info=courses.filter(function(c){return c.id===id})[0]||{title:id,en:""};return'<div class="lesson"><div><h3>'+esc(id+' · '+(info.title||''))+'</h3><div class="muted">课前 '+a.pre+' 条 · 课中 '+a.mid+' 条 · 课后 '+a.post+' 条</div></div><div class="score">'+a.score+'/'+a.total+' · '+(a.total?Math.round(a.score/a.total*100):0)+'%</div></div>'}).join(''):'<div class="empty">暂无历史课程数据。</div>')+'</section>';h+='<section class="panel"><h2 style="margin:0 0 12px;color:#44368f">阶段报告</h2>'+(window.HSK1_REPORT_BLOCKS||[]).map(function(b){var ids=courses.filter(function(c){return c.no>=b.from&&c.no<=b.to}).map(function(c){return c.id}),arr=ids.filter(function(id){return by[id]}),s=arr.reduce(function(v,id){return v+by[id].score},0),t=arr.reduce(function(v,id){return v+by[id].total},0);return'<div class="block"><h2>'+esc(b.label)+'</h2><div class="muted">已完成 '+arr.length+' / '+ids.length+' 课 · 阶段得分 '+s+'/'+t+' · 阶段准确率 '+(t?Math.round(s/t*100):0)+'%</div></div>'}).join('')+'</section>';document.getElementById("app").innerHTML=h}
init();
</script></body></html>
