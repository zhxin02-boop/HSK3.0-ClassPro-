<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ClassPro+ 待批改工作台</title>
<style>
*{box-sizing:border-box}
:root{--green:#4f8f2f;--line:#dfe9c8;--dark:#24351f;--red:#c0392b}
body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#f7f9ef,#fffaf3);color:var(--dark);padding:20px}
.wrap{max-width:1200px;margin:0 auto}.hero,.student{background:#fff;border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:0 12px 28px rgba(86,115,55,.1);margin-bottom:14px}
h1{margin:0 0 8px;color:#3f7f32;font-size:26px}.muted,.small{color:#74806d;font-size:13px;line-height:1.5}.small{font-size:12px}
button{border:0;border-radius:999px;padding:10px 16px;font-size:14px;font-weight:900;background:var(--green);color:#fff;cursor:pointer}.secondary{background:#edf6d9;color:#3f7f32}
.tools,.tags{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}.tag{display:inline-block;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;background:#edf6d9;color:#3f7f32}.waittag{background:#fff7ed;color:#b45309}.badtag{background:#fef2f2;color:#b42318}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}.card{background:#fbfdf6;border:1px solid var(--line);border-radius:16px;padding:14px}.num{font-size:28px;font-weight:900;color:#3f7f32}.label{font-size:12px;color:#74806d}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}th,td{padding:8px;border-bottom:1px solid #edf3dc;text-align:left;vertical-align:top}th{background:#edf6d9;color:#3f7f32}
textarea{width:100%;min-height:78px;border:1px solid #d8e4bf;border-radius:12px;padding:9px;font-family:inherit;font-size:13px}
.review-box{background:#fffaf0;border:1px solid #f1d399;border-radius:16px;padding:12px;margin-top:10px}
.answer-box{margin:8px 0;padding:10px;background:#fff;border-radius:12px;border:1px solid #eee;white-space:pre-wrap}
.writing-sheet{display:grid;gap:10px;margin-top:10px}.writing-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:8px;border:1px solid #eef3df;border-radius:14px;background:#fbfdf6}.label-char{width:38px;font-weight:900;color:#73806b}.model,.cell{width:58px;height:58px;border:1px solid #dce7c8;border-radius:10px;background:linear-gradient(90deg,transparent 49%,#edf2df 50%,transparent 51%),linear-gradient(0deg,transparent 49%,#edf2df 50%,transparent 51%),linear-gradient(45deg,transparent 49.4%,#f3eadb 50%,transparent 50.6%),linear-gradient(-45deg,transparent 49.4%,#f3eadb 50%,transparent 50.6%),#fff}.model{display:flex;align-items:center;justify-content:center;font-family:KaiTi,STKaiti,"Kaiti SC",serif;font-size:34px;color:rgba(45,59,41,.32);font-weight:900}
.empty{padding:24px;border:1px dashed var(--line);border-radius:16px;text-align:center;color:#74806d;background:#fbfdf6}
.review-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}.review-summary>div{background:#edf6d9;border:1px solid var(--line);border-radius:16px;padding:14px;text-align:center}.review-summary b{display:block;font-size:26px;color:#3f7f32}.review-summary span{font-size:12px;color:#526248}
.batch-tools{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid #f1d399}.batch-tools button{background:#2563eb}.batch-status{font-size:12px;color:#74806d}
</style>
<script src="../in-class/data_L02.js"></script>
<script src="../shared/context.js"></script>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>ClassPro+ 待批改工作台 / Review Desk</h1>
    <div class="muted">统一查看课前主观题、课后输出题和汉字书写。按学生分组，汉字书写直接显示在对应待批改记录中。</div>
    <div class="tools">
      <button onclick="loadData()">刷新待批改数据 / Refresh</button>
      <button class="secondary" onclick="location.href='../teacher/index.html'">教师主页 / Teacher Home</button>
      <button class="secondary" onclick="location.href='unified.html'">返回数据面板</button>
      <span class="muted" id="status">尚未读取</span>
    </div>
  </div>
  <div id="app"><div class="empty">点击“刷新课后数据”。</div></div>
</div>

<script>
var GAS="https://script.google.com/macros/s/AKfycbxrCd6f6cQ3wocXYQZyLKY0JutolEmOWWzTGOABnnHHJOm697OfyBlkLw-SQ-u-9ZAO/exec";
var LESSON=window.ClassProContext.read().lesson,records=[],reviewQueue={};
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function val(o,keys){for(var i=0;i<keys.length;i++){if(o&&o[keys[i]]!=null&&o[keys[i]]!=="")return o[keys[i]]}return""}
function fuzzy(o,keys,contains){var v=val(o,keys);if(v!=="")return v;var ks=Object.keys(o||{});for(var i=0;i<ks.length;i++){for(var j=0;j<contains.length;j++){if(ks[i].indexOf(contains[j])>=0&&o[ks[i]]!=null&&o[ks[i]]!=="")return o[ks[i]]}}return""}
function lessonOf(x){return fuzzy(x,["课程","lesson","璇剧▼"],["课程","lesson"])}
function stageOf(x){return fuzzy(x,["环节","stage","鐜妭"],["环节","stage"])}
function stageKey(x){var s=String(stageOf(x)||"").trim().toLowerCase().replace(/[\s-]/g,"");if(s==="预习"||s==="课前"||s==="pre"||s==="preclass"||s==="pre_class")return"pre";if(s==="课后"||s==="post"||s==="postclass"||s==="post_class")return"post";return s}
function moduleRaw(x){return fuzzy(x,["模块","module","妯″潡"],["模块","module"])}
function studentOf(x){return fuzzy(x,["姓名","studentName","name","濮撳悕"],["姓名","student","name"])}
function timeOf(x){return fuzzy(x,["提交时间","timestamp","receivedAt","submittedAt","鎻愪氦鏃堕棿"],["时间","timestamp","submitted"])}
function answerOf(x){return fuzzy(x,["学生作答","answer","瀛︾敓浣滅瓟"],["作答","answer"])}
function resultOf(x){return fuzzy(x,["结果","result","autoResult","缁撴灉"],["结果","result"])}
function statusOf(x){return fuzzy(x,["批改状态","reviewStatus","status","鎵规敼鐘舵€"],["批改","status"])}
function qidOf(x){return fuzzy(x,["题号","questionId","棰樺彿"],["题号","questionId"])}
function scoreOf(x){return Number(fuzzy(x,["得分","score","寰楀垎"],["得分","score"]))||0}
function totalOf(x){return Number(fuzzy(x,["总分","total","鎬诲垎"],["总分","total"]))||0}
function normResult(r){r=String(r||"").toLowerCase();if(r==="correct"||r==="true"||r==="正确")return"correct";if(r==="wrong"||r==="false"||r==="错误")return"wrong";return r||"submitted"}
// 字段位置兜底：GAS 固定写入顺序为
// 0提交时间 1姓名 2课程 3环节 4模块 5题号 6得分 7总分 8积分 13学生作答 14结果 15教师批改 16批改状态
// 由于历史表头有中文/乱码混用，教师端优先按列位置读取，避免误把 0 当作学生作答。
function col(x,i){if(x&&Array.isArray(x.__values)&&x.__values[i]!=null)return x.__values[i];return ""}
function pick(a,b){return a!=null&&a!==""?a:b}
function lessonOf(x){return pick(col(x,2),fuzzy(x,["课程","lesson","璇剧▼"],["课程","lesson"]))}
function stageOf(x){return pick(col(x,3),fuzzy(x,["环节","stage","鐜妭"],["环节","stage"]))}
function moduleRaw(x){return pick(col(x,4),fuzzy(x,["模块","module","妯″潡"],["模块","module"]))}
function studentOf(x){return pick(col(x,1),fuzzy(x,["姓名","studentName","name","濮撳悕"],["姓名","student","name"]))}
function timeOf(x){return pick(col(x,0),fuzzy(x,["提交时间","timestamp","receivedAt","submittedAt","鎻愂氦鏃堕棿"],["时间","timestamp","submitted"]))}
function answerOf(x){return pick(col(x,13),fuzzy(x,["学生作答","answer","瀛︾敓浣滟瓟","瀛︾敓浣滲瓟"],["作答","answer"]))}
function resultOf(x){return pick(col(x,14),fuzzy(x,["结果","result","autoResult","缁撴灉"],["结果","result"]))}
function statusOf(x){return pick(col(x,16),fuzzy(x,["批改状态","reviewStatus","status","鎵规敼鐘舵€"],["批改","status"]))}
function qidOf(x){return pick(col(x,5),fuzzy(x,["题号","questionId","棰樺彿"],["题号","questionId"]))}
function scoreOf(x){return Number(pick(col(x,6),fuzzy(x,["得分","score","寰楀垎"],["得分","score"])))||0}
function totalOf(x){return Number(pick(col(x,7),fuzzy(x,["总分","total","鎬诲垎"],["总分","total"])))||0}
function parseMaybeJson(s){
  if(s==null)return null;
  var txt=String(s).trim();
  for(var pass=0;pass<3;pass++){
    try{
      var obj=JSON.parse(txt);
      if(typeof obj==="string"){txt=obj.trim();continue}
      return obj;
    }catch(e){}
    var a=txt.indexOf("{"),b=txt.lastIndexOf("}");
    if(a>=0&&b>a){txt=txt.slice(a,b+1);continue}
    break;
  }
  return null;
}
function valuesOf(x){return Object.keys(x||{}).map(function(k){return x[k]})}
function findHandwritingAnswer(x){
  var vals=valuesOf(x);
  for(var i=0;i<vals.length;i++){
    var s=String(vals[i]||"");
    if(s.indexOf("handwriting")>=0&&s.indexOf("cells")>=0){
      var p=parseMaybeJson(s);
      if(p&&p.cells)return s;
    }
  }
  return "";
}
function anyFieldHas(x,needle){
  return valuesOf(x).some(function(v){return String(v||"").indexOf(needle)>=0});
}
function inferredModule(x){
  var m=String(moduleRaw(x)||"").trim();
  var hw=findHandwritingAnswer(x);
  var ans=hw||answerOf(x),parsed=parseMaybeJson(ans),qid=String(qidOf(x)||"");
  if(hw||anyFieldHas(x,"handwriting"))return"handwriting";
  if(parsed&&parsed.type==="handwriting")return"handwriting";
  if(qid.indexOf("_a_011")>=0||qid.indexOf("_b_010")>=0||qid.indexOf("_c_007")>=0||qid.indexOf("_c_008")>=0)return"output";
  if(m)return m;
  if(totalOf(x)===0&&normResult(resultOf(x))==="submitted")return"output";
  return "";
}
function needsReview(x){
  var m=inferredModule(x),st=String(statusOf(x)||""),nr=String(fuzzy(x,["needsReview","openEnded"],["needsReview","openEnded"]));
  var feedback=String(fuzzy(x,["教师批改","teacherFeedback","correction"],["批改","feedback","correction"])||"");
  if(st.indexOf("已批改")>=0||st.indexOf("宸叉壒")>=0||st.toLowerCase()==="reviewed"||feedback.trim())return false;
  var sk=stageKey(x),ml=String(m||"");
  if(m==="homework_summary")return false;
  if(sk==="pre"&&(ml.indexOf("造句")>=0||ml.indexOf("开放")>=0||ml==="output"||ml==="handwriting"))return true;
  return m==="output"||m==="handwriting"||nr==="true"||nr==="yes"||st.indexOf("待")>=0;
}
function loadData(){
  document.getElementById("status").textContent="正在读取...";
  var local=location.hostname==='localhost'||location.hostname==='127.0.0.1';var dataUrl=local?"/api/reviews":GAS+"?action=get_all";
  fetch(dataUrl).then(function(r){return r.json()}).then(function(d){
    var rows=[];if(d&&Array.isArray(d.data)){rows=d.data.slice()}else if(d&&d.data){for(var k in d.data){(d.data[k]||[]).forEach(function(x){rows.push(x)})}}
    records=rows.filter(function(x){var lesson=lessonOf(x),key=stageKey(x);return(!lesson||lesson===LESSON)&&(key==="pre"||key==="post"||needsReview(x))});
    var preCount=records.filter(function(x){return stageKey(x)==="pre"}).length,postCount=records.filter(function(x){return stageKey(x)==="post"}).length;
    document.getElementById("status").textContent="已读取 "+records.length+" 条记录：课前 "+preCount+"，课后 "+postCount;
    render();
  }).catch(function(err){document.getElementById("status").textContent="读取失败："+(err.message||err)});
}
function grouped(){var g={};records.filter(needsReview).forEach(function(r){var n=studentOf(r)||"未命名";(g[n]=g[n]||[]).push(r)});return g}
function stats(rows){var score=0,total=0,pending=0,hand=0;rows.forEach(function(r){var m=inferredModule(r);if(needsReview(r))pending++;if(m==="handwriting")hand++;var t=totalOf(r);if(t>0){score+=scoreOf(r);total+=t}});return{score:score,total:total,acc:total?Math.round(score/total*100):0,pending:pending,handwriting:hand}}
function render(){var g=grouped(),names=Object.keys(g).sort(),pre=records.filter(function(x){return needsReview(x)&&stageKey(x)==="pre"}).length,post=records.filter(function(x){return needsReview(x)&&stageKey(x)==="post"}).length;var summary='<div class="review-summary"><div><b>'+ (pre+post) +'</b><span>待批改总数 / Total</span></div><div><b>'+pre+'</b><span>课前 / Pre-class</span></div><div><b>'+post+'</b><span>课后 / Post-class</span></div></div>';if(!names.length){document.getElementById("app").innerHTML=summary+'<div class="empty">暂无待批改句子或书写题。</div>';return}document.getElementById("app").innerHTML=summary+names.map(function(n){return renderStudent(n,g[n])}).join("");setTimeout(drawAllHandwriting,0)}
function renderStudent(name,rows){
  var pre=rows.filter(function(r){return stageKey(r)==="pre"}),post=rows.filter(function(r){return stageKey(r)==="post"}),hand=rows.filter(function(r){return inferredModule(r)==="handwriting"});
  return '<div class="student"><h2 style="margin:0 0 8px;color:#315b29">'+esc(name)+'</h2>'+
    '<div class="grid"><div class="card"><div class="num">'+rows.length+'</div><div class="label">待批改总数 / Total</div></div><div class="card"><div class="num">'+pre.length+'</div><div class="label">课前 / Pre-class</div></div><div class="card"><div class="num">'+post.length+'</div><div class="label">课后 / Post-class</div></div><div class="card"><div class="num">'+hand.length+'</div><div class="label">汉字书写 / Handwriting</div></div></div>'+renderReview(name,rows)+'</div>';
}
function renderWrong(rows){if(!rows.length)return'<div class="tags"><span class="tag">暂无客观错题</span></div>';return'<div class="review-box"><b>客观错题</b><table><tr><th>题号</th><th>模块</th><th>学生答案</th></tr>'+rows.map(function(r){return'<tr><td>'+esc(qidOf(r))+'</td><td>'+esc(inferredModule(r))+'</td><td>'+esc(answerOf(r))+'</td></tr>'}).join("")+'</table></div>'}
function renderReview(name,rows){
  if(!rows.length)return'<div class="review-box"><b>待批改/查看</b><div class="small">暂无。</div></div>';
  return'<div class="review-box"><b>待批改/查看</b>'+rows.map(function(r,i){var m=inferredModule(r),qid=qidOf(r),ans=answerOf(r),id=reviewId(r,name);return'<div id="review_'+id+'" style="margin-top:12px;border-top:1px dashed #edd6aa;padding-top:10px"><div><span class="tag '+(m==="handwriting"?"waittag":"")+'">'+esc(m||"review")+'</span> <b>'+esc(qid)+'</b> <span class="small">'+esc(timeOf(r))+'</span></div>'+renderAnswerPreview(ans,m,id,r)+'<textarea id="fb_'+id+'" placeholder="写给学生的反馈">'+esc(val(r,["教师批改","teacherFeedback","correction","鏁欏笀鎵规敼"]))+'</textarea><div class="tools"><button onclick="saveReview(\''+esc(name).replace(/'/g,"\\'")+'\',\''+esc(timeOf(r)).replace(/'/g,"\\'")+'\',\''+id+'\')">保存批改</button><span class="small" id="st_'+id+'"></span></div></div>'}).join("")+'</div>';
}
 function renderReview(name,rows){
   if(!rows.length)return'<div class="review-box"><b>待批改句子 / Needs Review</b><div class="small">暂无。</div></div>';
   return'<div class="review-box"><b>待批改句子 / Needs Review</b>'+rows.map(function(r){var m=inferredModule(r),qid=qidOf(r),ans=answerOf(r),id=reviewId(r,name),stage=stageKey(r)==="pre"?'课前 / Pre-class':'课后 / Post-class';return'<div id="review_'+id+'" style="margin-top:12px;border-top:1px dashed #edd6aa;padding-top:10px"><div><span class="tag">'+stage+'</span> <span class="tag '+(m==="handwriting"?"waittag":"")+'">'+esc(m||"review")+'</span> <b>'+esc(qid)+'</b> <span class="small">'+esc(timeOf(r))+'</span></div>'+renderAnswerPreview(ans,m,id,r)+'<textarea id="fb_'+id+'" placeholder="写给学生的反馈 / Teacher feedback">'+esc(val(r,["教师批改","teacherFeedback","correction","鏁欏笀鎵规敼"]))+'</textarea><div class="tools"><button onclick="saveReview(\''+esc(name).replace(/'/g,"\\'")+'\',\''+esc(timeOf(r)).replace(/'/g,"\\'")+'\',\''+id+'\')">保存批改 / Save</button><span class="small" id="st_'+id+'"></span></div></div>'}).join("")+'</div>';
 }
 function safeId(s){return String(s).replace(/[^a-zA-Z0-9_]/g,"_")}
function reviewId(r,name){return safeId((name||studentOf(r)||"")+"_"+qidOf(r)+"_"+timeOf(r))}
function renderAnswerPreview(ans,m,id,row){if(m==="handwriting"){var real=findHandwritingAnswer(row)||ans;var data=parseMaybeJson(real);if(!data||!data.cells)return'<div class="answer-box">书写数据暂未找到。原始作答列：'+esc(String(ans||"").slice(0,120))+'<br><span class="small">提示：这条记录已识别为书写题，但当前表格行里没有找到 handwriting/cells JSON。</span></div>';return renderHandwriting(data,id)}return'<div class="answer-box">'+esc(ans||"未作答")+'</div>'}
function renderHandwriting(data,id){var grouped={};(data.cells||[]).forEach(function(c){(grouped[c.char]=grouped[c.char]||[]).push(c)});var html='<div class="writing-sheet">';Object.keys(grouped).forEach(function(ch){grouped[ch].sort(function(a,b){return Number(a.cell)-Number(b.cell)});html+='<div class="writing-row"><span class="label-char">'+esc(ch)+'</span><span class="model">'+esc(ch)+'</span>'+grouped[ch].map(function(c){return'<canvas class="cell" width="116" height="116" data-strokes="'+esc(JSON.stringify(c.strokes||[]))+'"></canvas>'}).join("")+'</div>'});return html+'</div>'}
function renderAll(rows){return'<details style="margin-top:12px"><summary class="small">查看全部课后记录</summary><table><tr><th>时间</th><th>模块</th><th>题号</th><th>得分</th><th>结果/状态</th><th>操作</th></tr>'+rows.slice().reverse().map(function(r,i){var m=inferredModule(r),qid=qidOf(r),id=reviewId(r),op=needsReview(r)?'<button class="secondary" onclick="jumpReview(&quot;'+id+'&quot;)">去批改/查看</button>':'';return'<tr><td>'+esc(timeOf(r))+'</td><td>'+esc(m)+'</td><td>'+esc(qid)+'</td><td>'+scoreOf(r)+'/'+totalOf(r)+'</td><td>'+esc(normResult(resultOf(r))+' '+statusOf(r))+'</td><td>'+op+'</td></tr>'}).join("")+'</table></details>'}
function jumpReview(id){var el=document.getElementById("review_"+id);if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.style.outline="3px solid #f0c36d";setTimeout(function(){el.style.outline=""},1600)}}
function saveReview(name,timestamp,id){var correction=document.getElementById("fb_"+id).value||"已查看。";var payload={action:"mark_reviewed",lesson:LESSON,studentName:name,timestamp:timestamp,correction:correction};document.getElementById("st_"+id).textContent="正在保存...";var local=location.hostname==='localhost'||location.hostname==='127.0.0.1';var url=local?"/api/mark-reviewed":GAS;fetch(url,{method:"POST",mode:local?"same-origin":"no-cors",headers:{"Content-Type":local?"application/json":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(function(){document.getElementById("st_"+id).textContent="已保存。刷新后可查看状态。"}).catch(function(){document.getElementById("st_"+id).textContent="已尝试保存，请刷新确认。"})}
function drawGrid(ctx,w,h){ctx.clearRect(0,0,w,h);ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);ctx.strokeStyle="#edf2df";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(w/2,0);ctx.lineTo(w/2,h);ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();ctx.strokeStyle="#f3eadb";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(w,h);ctx.moveTo(w,0);ctx.lineTo(0,h);ctx.stroke()}
function normalizeHandwritingStrokes(raw){var out=[];(raw||[]).forEach(function(st){if(!Array.isArray(st)||!st.length)return;if(Array.isArray(st[0]))st.forEach(function(inner){if(Array.isArray(inner)&&inner.length&&inner[0]&&inner[0].x!=null)out.push(inner)});else if(st[0]&&st[0].x!=null)out.push(st)});return out}
function drawAllHandwriting(){document.querySelectorAll("canvas.cell").forEach(function(c){var ctx=c.getContext("2d"),w=c.width,h=c.height,strokes=[];drawGrid(ctx,w,h);try{strokes=normalizeHandwritingStrokes(JSON.parse(c.dataset.strokes||"[]"))}catch(e){}ctx.strokeStyle="#c0392b";ctx.lineWidth=7;ctx.lineCap="round";ctx.lineJoin="round";(strokes||[]).forEach(function(st){if(!st||!st.length)return;ctx.beginPath();ctx.moveTo(st[0].x*w,st[0].y*h);for(var i=1;i<st.length;i++)ctx.lineTo(st[i].x*w,st[i].y*h);ctx.stroke()})})}
function renderStudent(name,rows){reviewQueue[name]=rows;var pre=rows.filter(function(r){return stageKey(r)==="pre"}),post=rows.filter(function(r){return stageKey(r)==="post"}),hand=rows.filter(function(r){return inferredModule(r)==="handwriting"}),safe=String(name).replace(/'/g,"\\'");return'<div class="student"><h2 style="margin:0 0 8px;color:#315b29">'+esc(name)+'</h2><div class="grid"><div class="card"><div class="num">'+rows.length+'</div><div class="label">待批改总数 / Total</div></div><div class="card"><div class="num">'+pre.length+'</div><div class="label">课前 / Pre-class</div></div><div class="card"><div class="num">'+post.length+'</div><div class="label">课后 / Post-class</div></div><div class="card"><div class="num">'+hand.length+'</div><div class="label">汉字书写 / Handwriting</div></div></div>'+renderReview(name,rows)+'<div class="batch-tools"><span class="batch-status" id="batch_'+safeId(name)+'">逐条填写反馈后统一保存。</span><button onclick="saveStudentReviews(\''+safe+'\')">保存本学生全部批改 / Save All</button></div></div>'}
function renderReview(name,rows){if(!rows.length)return'<div class="review-box"><b>待批改句子 / Needs Review</b><div class="small">暂无。</div></div>';return'<div class="review-box"><b>待批改句子 / Needs Review</b>'+rows.map(function(r){var m=inferredModule(r),qid=qidOf(r),ans=answerOf(r),id=reviewId(r,name),stage=stageKey(r)==="pre"?'课前 / Pre-class':'课后 / Post-class';return'<div id="review_'+id+'" style="margin-top:12px;border-top:1px dashed #edd6aa;padding-top:10px"><div><span class="tag">'+stage+'</span> <span class="tag '+(m==="handwriting"?"waittag":"")+'">'+esc(m||"review")+'</span> <b>'+esc(qid)+'</b> <span class="small">'+esc(timeOf(r))+'</span></div>'+questionPreview(r,m)+renderAnswerPreview(ans,m,id,r)+'<textarea id="fb_'+id+'" placeholder="写给学生的反馈 / Teacher feedback">'+esc(val(r,["教师批改","teacherFeedback","correction","鏁欏笀鎵规敼"]))+'</textarea><div class="small" id="st_'+id+'"></div></div>'}).join("")+'</div>'}
function findQuestionText(r){var qid=String(qidOf(r)||""),pool=[];if(window.LESSON_DATA&&window.LESSON_DATA.postClassHomework){var hw=window.LESSON_DATA.postClassHomework;pool=(hw.shared_pool||[]).concat((hw.tier_pools&&hw.tier_pools.A)||[],(hw.tier_pools&&hw.tier_pools.B)||[],(hw.tier_pools&&hw.tier_pools.C)||[])}for(var i=0;i<pool.length;i++){if(String(pool[i].id)===qid)return(pool[i].prompt_cn||pool[i].question||pool[i].prompt||"")}
  var m=String(moduleRaw(r)||"");if(stageKey(r)==="pre"&&m.indexOf("开放")>=0)return"你叫什么名字？请写一个完整的句子。";if(stageKey(r)==="pre"&&m.indexOf("造句")>=0)return"请用“对不起”和“没关系”写一个简短的对话。";return""}
function questionPreview(r,m){var q=val(r,["题目说明","questionText","prompt","question","task","instruction"])||findQuestionText(r);if(!q&&m==="handwriting")q="请完成汉字书写，并检查笔顺和字形。 / Complete the handwriting task.";if(!q&&m)q="请完成“"+m+"”任务。 / Complete the "+m+" task.";return'<div class="answer-box" style="background:#fffaf0"><b>题目说明 / Task</b><br>'+esc(q||"题目说明暂缺，请补充题库题干")+'</div>'}
function saveStudentReviews(name){var rows=reviewQueue[name]||[],status=document.getElementById("batch_"+safeId(name));if(!rows.length)return;status.textContent="正在保存 0 / "+rows.length+"...";var local=location.hostname==='localhost'||location.hostname==='127.0.0.1',url=local?"/api/mark-reviewed":GAS;rows.reduce(function(p,r,i){return p.then(function(){var id=reviewId(r,name),correction=document.getElementById("fb_"+id).value||"已查看。";return fetch(url,{method:"POST",mode:local?"same-origin":"no-cors",headers:{"Content-Type":local?"application/json":"text/plain;charset=utf-8"},body:JSON.stringify({action:"mark_reviewed",lesson:LESSON,studentName:name,timestamp:timeOf(r),correction:correction})}).then(function(){var st=document.getElementById("st_"+id);if(st)st.textContent="已保存 / Saved";status.textContent="正在保存 "+(i+1)+" / "+rows.length+"..."})})},Promise.resolve()).then(function(){status.textContent="本学生全部批改已保存 / All saved"}).catch(function(){status.textContent="部分保存失败，请刷新后重试 / Retry"})}
</script>
<script>
(function(){
  var oldSaveReview=window.saveReview,oldSaveStudentReviews=window.saveStudentReviews;
  window.saveReview=function(){oldSaveReview.apply(this,arguments);setTimeout(loadData,1200)};
  window.saveStudentReviews=function(){oldSaveStudentReviews.apply(this,arguments);setTimeout(loadData,1500)};
})();
</script>
<script>
(function(){
  function latestReviewRows(rows){
    var latest={},others=[];
    rows.forEach(function(r){
      var stage=stageKey(r),m=inferredModule(r),qid=String(qidOf(r)||"");
      if(stage!=="post"||!(m==="output"||m==="handwriting")||!qid){others.push(r);return}
      var key=String(studentOf(r)||"")+"|"+qid,old=latest[key];
      if(!old||new Date(timeOf(r)).getTime()>=new Date(timeOf(old)).getTime())latest[key]=r;
    });
    Object.keys(latest).forEach(function(k){others.push(latest[k])});
    return others;
  }
  var oldRender=render;
  render=function(){records=latestReviewRows(records);oldRender()};
})();
</script>
