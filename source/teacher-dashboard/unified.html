<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ClassPro+ 三阶段数据面板</title>
<style>
*{box-sizing:border-box}
:root{--green:#6ea72d;--blue:#2563eb;--red:#c0392b;--dark:#203421;--line:#dfeac8}
body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#f7f9ef,#fffaf3);color:var(--dark);padding:22px}
.wrap{max-width:1180px;margin:0 auto}.hero,.panel,.card{background:#fff;border:1px solid var(--line);box-shadow:0 12px 28px rgba(86,115,55,.1)}
.hero{border-radius:22px;padding:22px;display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}.panel{border-radius:20px;padding:18px;margin:14px 0}.card{border-radius:18px;padding:16px}
h1{margin:0 0 6px;color:#3f7f32;font-size:26px}.sub,.muted{color:#74806d;font-size:13px;line-height:1.45}
.tools,.tabs,.tags{display:flex;gap:8px;flex-wrap:wrap}.btn,.tab{border:0;border-radius:999px;padding:10px 15px;font-weight:900;cursor:pointer}.btn{background:var(--green);color:#fff}.btn.secondary{background:#edf6d9;color:#3f7f32}.btn.blue{background:var(--blue)}
.tabs{margin:18px 0}.tab{border:1px solid var(--line);background:#fff;color:#526248}.tab.active{background:var(--green);color:#fff;border-color:var(--green)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:14px 0}.num{font-size:30px;font-weight:900;color:#3f7f32;line-height:1.1}.label{font-size:12px;color:#74806d;margin-top:5px}
.panel h2{margin:0 0 12px;font-size:19px;color:#315b29}table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:14px;overflow:hidden}th,td{padding:9px;border-bottom:1px solid #edf3dc;text-align:left;vertical-align:top}th{background:#edf6d9;color:#3f7f32;font-weight:900}
.pill,.tag{display:inline-block;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900}.ok{background:#e8f6ee;color:#2f7d32}.bad{background:#fef2f2;color:#b42318}.wait{background:#fff7ed;color:#b45309}.tag{background:#edf6d9;color:#3f7f32}.empty{padding:22px;border:1px dashed var(--line);border-radius:16px;text-align:center;color:#74806d;background:#fbfdf6}
input[type=file]{max-width:230px}.toolbar-card{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:#f8fbf0;border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin:14px 0}.toolbar-card label{font-size:13px;font-weight:900;color:#526248}.toolbar-card select{border:1px solid #cfe2a5;border-radius:10px;padding:8px 12px;background:#fff;color:var(--dark);min-width:180px}.quick-links{display:flex;gap:8px;flex-wrap:wrap}.quick-links a{color:#3f7f32;text-decoration:none;font-size:12px;font-weight:900;background:#edf6d9;border-radius:999px;padding:8px 11px}.student-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.student-card{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fbfdf6}.student-card h3{margin:0 0 10px;color:#315b29;font-size:16px}.student-card .line{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed #e7efd8;font-size:13px}.student-card .line:last-child{border-bottom:0}.student-card a{display:inline-block;margin-top:10px;color:#2563eb;font-size:12px;font-weight:900}
</style>
<script src="../data-model/hsk1-curriculum.js"></script>
<script src="../shared/context.js"></script>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div>
      <h1>ClassPro+ 三阶段数据面板</h1>
      <div class="sub">HSK1-L02 · 课前预习 / 课中互动 / 课后巩固统一查看</div>
      <div class="muted" id="status">数据源：本地缓存 + Google Sheets</div>
    </div>
    <div class="tools">
      <button class="btn secondary" onclick="location.href='../teacher/index.html'">教师主页 / Teacher Home</button>
      <button class="btn secondary" onclick="loadCloud()">刷新云端数据</button>
      <button class="btn secondary" onclick="loadLocal()">读取本地缓存</button>
      <button class="btn blue" onclick="exportMerged()">导出总表 JSON</button>
      <button class="btn secondary" onclick="location.href='post-review.html'">待批改工作台 / Review Desk</button>
      <input type="file" id="jsonIn" accept="application/json" onchange="importJson(this)">
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('overview',this)">总览</button>
    <button class="tab" onclick="showTab('pre',this)">课前</button>
    <button class="tab" onclick="showTab('inclass',this)">课中</button>
    <button class="tab" onclick="showTab('post',this)">课后</button>
    <button class="tab" onclick="showTab('students',this)">按学生</button>
  </div>
  <div class="toolbar-card">
    <label>当前课程
      <select id="lessonFilter" onchange="state.pendingLesson=this.value"></select>
    </label>
    <button class="btn secondary" onclick="applyLessonFilter()">确认课程 / Apply Lesson</button>
    <label>当前查看范围
      <select id="studentFilter" onchange="state.pendingStudent=this.value"><option value="">全班</option></select>
      <button class="btn secondary" onclick="applyStudentFilter()">确认查看 / Apply</button>
    </label>
    <div class="quick-links"><a href="post-review.html">待批改工作台 / Review Desk</a></div>
  </div>
  <div id="app"></div>
</div>
<script>
var GAS='https://script.google.com/macros/s/AKfycbxrCd6f6cQ3wocXYQZyLKY0JutolEmOWWzTGOABnnHHJOm697OfyBlkLw-SQ-u-9ZAO/exec';
var _ctx=window.ClassProContext.read(),LESSON=_ctx.lesson,ROOM=_ctx.room,tab='overview';
var state={cloudRows:[],localData:null,importedData:null,lastCloud:''};
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function val(o,keys){for(var i=0;i<keys.length;i++){if(o&&o[keys[i]]!=null&&o[keys[i]]!=='')return o[keys[i]]}return''}
function normResult(r){r=String(r||'').toLowerCase();if(r==='correct'||r==='true'||r==='对'||r==='正确')return'correct';if(r==='wrong'||r==='false'||r==='错'||r==='错误')return'wrong';return r}
function showTab(t,btn){tab=t;document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});if(btn)btn.classList.add('active');render()}
function scoped(rows){var n=state.student||new URLSearchParams(location.search).get('student')||'';return n?rows.filter(function(x){return String(val(x,['姓名','studentName','name','濮撳悕']))===n}):rows}
function splitRows(rows){var pre=[],mid=[],post=[],summary=[];rows.forEach(function(x){var lesson=val(x,['课程','lesson','璇剧▼']);if(lesson&&lesson!==LESSON)return;var stage=val(x,['环节','stage','鐜妭']);var mod=val(x,['模块','module','妯″潡']);if(stage==='预习'||stage==='课前'||stage==='pre_class')pre.push(x);else if(stage==='课后'||stage==='post_class')post.push(x);else if(mod==='session_summary')summary.push(x);else if(stage==='课中'||stage==='in_class'||mod)mid.push(x)});return{pre:pre,mid:mid,post:post,summary:summary}}
function loadCloud(){document.getElementById('app').innerHTML='<div class="empty">正在读取 Google Sheets...</div>';fetch(GAS+'?action=get_all').then(function(r){return r.json()}).then(function(d){var rows=[];if(d&&d.data){for(var k in d.data){(d.data[k]||[]).forEach(function(x){rows.push(x)})}}state.cloudRows=rows;state.lastCloud=new Date().toLocaleString();document.getElementById('status').textContent='云端已刷新：'+state.lastCloud+'；记录 '+rows.length+' 条';render()}).catch(function(){document.getElementById('status').textContent='云端读取失败，可先查看本地缓存。';render()})}
function loadLocal(){try{var raw=localStorage.getItem('ClassProData_'+ROOM);state.localData=raw?JSON.parse(raw):null}catch(e){state.localData=null}render()}
function importJson(input){var f=input.files&&input.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{state.importedData=JSON.parse(rd.result);render()}catch(e){alert('JSON 文件无法读取')}};rd.readAsText(f,'utf-8')}
function cloud(){var c=splitRows(state.cloudRows),n=state.student||new URLSearchParams(location.search).get('student')||'';if(!n)return c;function f(a){return a.filter(function(x){return String(val(x,['姓名','studentName','name','濮撳悕']))===n})}return{pre:f(c.pre),mid:f(c.mid),post:f(c.post),summary:f(c.summary)}}
function preStats(){var rows=cloud().pre,stu={},pending=0,score=0,total=0,weak={};rows.forEach(function(x){var n=val(x,['姓名','studentName','name','濮撳悕']);if(n)stu[n]=1;var st=val(x,['批改状态','status','鎵规敼鐘舵€?']);if(String(st).indexOf('待')>=0)pending++;var sc=Number(val(x,['得分','score','寰楀垎'])),tt=Number(val(x,['总分','total','鎬诲垎']));if(!isNaN(sc)&&!isNaN(tt)&&tt>0){score+=sc;total+=tt}var w=val(x,['薄弱点','weakPoints','weakPoint','钖勫急鐐?']);if(w)weak[w]=(weak[w]||0)+1});return{students:Object.keys(stu).length,records:rows.length,pending:pending,acc:total?Math.round(score/total*100):0,weak:weak}}
function localRecords(){var d=state.importedData||state.localData||{};return d.records||[]}
function localScoreboard(){var d=state.importedData||state.localData||{};return d.scoreboard||[]}
function cloudMidRecords(){return cloud().mid.map(function(x){return{studentName:val(x,['姓名','studentName','name','濮撳悕']),mode:val(x,['模块','module','妯″潡']),questionId:val(x,['题号','questionId']),answer:val(x,['学生作答','answer','瀛︾敓浣滅瓟']),result:normResult(val(x,['结果','result','autoResult'])),points:Number(val(x,['积分','points','pointsAwarded']))||0,basePoint:Number(val(x,['基础分','basePoint']))||0,speedRank:val(x,['速度名次','speedRank']),speedBonus:Number(val(x,['速度奖励','speedBonus']))||0,receivedAt:val(x,['提交时间','receivedAt','submittedAt','鎻愴氦鏃堕棿'])}})}
function inRows(){var cloudRows=cloudMidRecords();return cloudRows.length?cloudRows:localRecords()}
function inStats(){var rec=inRows(),correct=rec.filter(function(r){return normResult(r.result)==='correct'}).length,wrong=rec.filter(function(r){return normResult(r.result)==='wrong'}).length,stu={};rec.forEach(function(r){if(r.studentName)stu[r.studentName]=1});var board=scoreboardFromRecords(rec);return{students:Object.keys(stu).length||((state.localData&&state.localData.roster)||[]).length,participants:Object.keys(stu).length,records:rec.length,correct:correct,wrong:wrong,acc:rec.length?Math.round(correct/rec.length*100):0,top:board.slice(0,5)}}
function postRows(){return scoped(cloud().post)}
function postVal(x,keys){return val(x,keys)}
function isReviewModule(m){m=String(m||'');return m==='output'||m==='handwriting'}
function isSummaryModule(m){return String(m||'')==='homework_summary'}
function postStats(){var rows=postRows(),stu={},summary={},objScore=0,objTotal=0,pending=0,hand=0;rows.forEach(function(x){var n=postVal(x,['姓名','studentName','name','濮撳悕']);var m=postVal(x,['模块','module','妯″潡']);if(n)stu[n]=1;if(isSummaryModule(m))summary[n]=x;if(m==='handwriting')hand++;if(isReviewModule(m))pending++;var sc=Number(postVal(x,['得分','score','寰楀垎'])),tt=Number(postVal(x,['总分','total','鎬诲垎']));if(!isNaN(sc)&&!isNaN(tt)&&tt>0){objScore+=sc;objTotal+=tt}});return{students:Object.keys(stu).length,submitted:Object.keys(summary).length,records:rows.length,acc:objTotal?Math.round(objScore/objTotal*100):0,pending:pending,handwriting:hand}}
function scoreboardFromRecords(rec){var s={};rec.forEach(function(r){var n=r.studentName;if(!n||n==='__CLASS__')return;s[n]=(s[n]||0)+(Number(r.pointsAwarded||r.points)||0)});var arr=Object.keys(s).map(function(n){return{name:n,points:s[n]}});if(!arr.length){return localScoreboard().map(function(r){return{name:r.n||r.name,points:r.t||r.points||0}})}return arr.sort(function(a,b){return b.points-a.points})}
function cards(items){return'<div class="grid">'+items.map(function(x){return'<div class="card"><div class="num">'+esc(x.n)+'</div><div class="label">'+esc(x.l)+'</div></div>'}).join('')+'</div>'}
function renderOverview(){var p=preStats(),i=inStats(),po=postStats();return cards([{n:p.students,l:'课前完成人数'},{n:p.acc+'%',l:'课前客观正确率'},{n:i.participants+'/'+i.students,l:'课中参与'},{n:i.acc+'%',l:'课中正确率'},{n:po.submitted,l:'课后提交人数'},{n:po.pending+p.pending,l:'待批改/查看'}])+renderSuggestions()}
function renderPre(){var p=preStats(),weak=Object.keys(p.weak).sort(function(a,b){return p.weak[b]-p.weak[a]});return cards([{n:p.students,l:'完成人数'},{n:p.records,l:'提交记录'},{n:p.acc+'%',l:'客观题正确率'},{n:p.pending,l:'待批改'}])+'<div class="panel"><h2>高频薄弱点</h2><div class="tags">'+(weak.length?weak.slice(0,8).map(function(k){return'<span class="tag">'+esc(k)+' × '+p.weak[k]+'</span>'}).join(''):'<span class="muted">暂无薄弱点记录</span>')+'</div></div>'+tablePre()}
function tablePre(){var rows=cloud().pre.slice(-80).reverse();if(!rows.length)return'<div class="empty">暂无课前数据。可点击“刷新云端数据”。</div>';return'<div class="panel"><h2>课前提交记录</h2><table><tr><th>时间</th><th>姓名</th><th>模块</th><th>得分</th><th>作答</th><th>状态</th></tr>'+rows.map(function(x){return'<tr><td>'+esc(val(x,['提交时间','timestamp','鎻愴氦鏃堕棿']))+'</td><td>'+esc(val(x,['姓名','studentName','濮撳悕']))+'</td><td>'+esc(val(x,['模块','module','妯″潡']))+'</td><td>'+esc(val(x,['得分','score','寰楀垎']))+'/'+esc(val(x,['总分','total','鎬诲垎']))+'</td><td>'+esc(val(x,['学生作答','answer','瀛︾敓浣滅瓟']))+'</td><td>'+esc(val(x,['批改状态','status','鎵规敼鐘舵€?']))+'</td></tr>'}).join('')+'</table></div>'}
function renderInClass(){var s=inStats();if(!s.records)return'<div class="empty">暂无课中数据。请先完成一次课堂互动，或导入教师端 JSON。</div>';return cards([{n:s.participants+'/'+s.students,l:'参与人数'},{n:s.records,l:'答题记录'},{n:s.acc+'%',l:'正确率'},{n:s.correct,l:'正确次数'},{n:s.wrong,l:'错误次数'}])+'<div class="panel"><h2>排行榜 Top 5</h2><div class="tags">'+(s.top.length?s.top.map(function(r,idx){return'<span class="tag">#'+(idx+1)+' '+esc(r.name)+' · '+esc(r.points||0)+' pts</span>'}).join(''):'<span class="muted">暂无积分</span>')+'</div></div>'+tableRecords()}
function tableRecords(){var rec=inRows().slice(0,120);if(!rec.length)return'<div class="empty">暂无课中答题记录。</div>';return'<div class="panel"><h2>课中答题记录</h2><table><tr><th>时间</th><th>姓名</th><th>题型</th><th>题号</th><th>答案</th><th>结果</th><th>积分</th><th>速度奖励</th></tr>'+rec.map(function(r){var res=normResult(r.result);return'<tr><td>'+esc(r.receivedAt||r.submittedAt)+'</td><td>'+esc(r.studentName)+'</td><td>'+esc(r.mode)+'</td><td>'+esc(r.questionId)+'</td><td>'+esc(r.answer)+'</td><td><span class="pill '+(res==='correct'?'ok':res==='wrong'?'bad':'wait')+'">'+esc(res||'')+'</span></td><td>'+esc(r.pointsAwarded||r.points||0)+'</td><td>'+esc(r.speedRank?('#'+r.speedRank+' +'+(r.speedBonus||0)):'')+'</td></tr>'}).join('')+'</table></div>'}
function renderSuggestions(){var p=preStats(),weak=Object.keys(p.weak).sort(function(a,b){return p.weak[b]-p.weak[a]}).slice(0,3),rec=inRows(),wrongModes={};rec.forEach(function(r){if(normResult(r.result)==='wrong')wrongModes[r.mode]=(wrongModes[r.mode]||0)+1});var wm=Object.keys(wrongModes).sort(function(a,b){return wrongModes[b]-wrongModes[a]}).slice(0,3),h='<div class="panel"><h2>课后巩固建议</h2><div class="tags">';weak.forEach(function(k){h+='<span class="tag">课前薄弱：'+esc(k)+'</span>'});wm.forEach(function(k){h+='<span class="tag">课中易错：'+esc(k)+' × '+wrongModes[k]+'</span>'});if(!weak.length&&!wm.length)h+='<span class="muted">数据还不够，完成一次课堂后会生成建议。</span>';return h+'</div><p class="muted">建议课后练习优先覆盖：错误最多的题型、课前薄弱点、未参与或低积分学生。后续可把这里扩展为自动生成 ClassPro+ 课后练习包。</p></div>'}
function previewAnswer(a,m){if(m==='handwriting')return'汉字书写记录（点击“汉字书写”查看笔迹）';if(String(a||'').length>90)return String(a).slice(0,90)+'...';return a}
function tablePostRows(rows,title){if(!rows.length)return'<div class="empty">暂无'+title+'。</div>';return'<div class="panel"><h2>'+title+'</h2><table><tr><th>时间</th><th>姓名</th><th>模块</th><th>题号</th><th>得分</th><th>结果</th><th>作答</th></tr>'+rows.slice(-160).reverse().map(function(x){var m=postVal(x,['模块','module','妯″潡']),res=normResult(postVal(x,['结果','result','autoResult']));return'<tr><td>'+esc(postVal(x,['提交时间','timestamp','receivedAt','submittedAt','鎻愪氦鏃堕棿']))+'</td><td>'+esc(postVal(x,['姓名','studentName','name','濮撳悕']))+'</td><td>'+esc(m)+'</td><td>'+esc(postVal(x,['题号','questionId','棰樺彿']))+'</td><td>'+esc(postVal(x,['得分','score','寰楀垎']))+'/'+esc(postVal(x,['总分','total','鎬诲垎']))+'</td><td><span class="pill '+(res==='correct'?'ok':res==='wrong'?'bad':'wait')+'">'+esc(res||'submitted')+'</span></td><td>'+esc(previewAnswer(postVal(x,['学生作答','answer','瀛︾敓浣滅瓟']),m))+'</td></tr>'}).join('')+'</table></div>'}
function renderPost(){var s=postStats(),rows=postRows(),pending=rows.filter(function(x){return isReviewModule(postVal(x,['模块','module','妯″潡']))});return cards([{n:s.submitted,l:'作业提交人数'},{n:s.records,l:'课后记录数'},{n:s.acc+'%',l:'课后客观正确率'},{n:s.pending,l:'待批改/查看'},{n:s.handwriting,l:'汉字书写记录'}])+renderSuggestions()+tablePostRows(pending,'待批改/查看')+tablePostRows(rows,'课后作业记录')}
function rowValue(x,i){if(x&&x.__values&&x.__values[i]!=null)return x.__values[i];var ks=Object.keys(x||{}).filter(function(k){return k!=="__values"&&k!=="__rowIndex"});return ks[i]!=null?x[ks[i]]:""}
function tablePostRows2(rows,title){if(!rows.length)return'<div class="empty">暂无'+title+'。</div>';return'<div class="panel"><h2>'+title+'</h2><table><tr><th>时间</th><th>姓名</th><th>模块</th><th>题号</th><th>得分</th><th>结果</th><th>作答</th><th>操作</th></tr>'+rows.slice(-160).reverse().map(function(x){var m=rowValue(x,4),res=normResult(rowValue(x,14)),op=(m==='output'||m==='handwriting')?'<button class="btn secondary" onclick="location.href=&quot;post-review.html&quot;">打开课后批改</button>':'';return'<tr><td>'+esc(rowValue(x,0))+'</td><td>'+esc(rowValue(x,1))+'</td><td>'+esc(m)+'</td><td>'+esc(rowValue(x,5))+'</td><td>'+esc(rowValue(x,6))+'/'+esc(rowValue(x,7))+'</td><td><span class="pill '+(res==='correct'?'ok':res==='wrong'?'bad':'wait')+'">'+esc(res||'submitted')+'</span></td><td>'+esc(previewAnswer(rowValue(x,13),m))+'</td><td>'+op+'</td></tr>'}).join('')+'</table></div>'}
function renderPost2(){var s=postStats(),rows=postRows(),pending=rows.filter(function(x){return isReviewModule(postVal(x,['妯″潡','module','濡€虫健']))});return cards([{n:s.submitted,l:'作业提交人数'},{n:s.records,l:'课后记录数'},{n:s.acc+'%',l:'课后客观正确率'},{n:s.pending,l:'待批改/查看'},{n:s.handwriting,l:'汉字书写记录'}])+renderSuggestions()+tablePostRows2(pending,'待批改/查看')+tablePostRows2(rows,'课后作业记录')}
function allRows(){var c=splitRows(state.cloudRows);return c.pre.concat(c.mid).concat(c.post)}
function setStudentFilter(n){state.student=n;state.pendingStudent=n;render()}
function applyStudentFilter(){state.student=state.pendingStudent||'';render()}
function applyLessonFilter(){LESSON=state.pendingLesson||LESSON;state.student='';state.pendingStudent='';tab='overview';render()}
function studentRows(n){return allRows().filter(function(x){return !n||String(val(x,['姓名','studentName','name','濮撳悕']))===n})}
function dataVal(x,keys,index){var v=val(x,keys);if(v!==''&&v!=null)return v;if(x&&x.__values&&index!=null&&x.__values[index]!=null)return x.__values[index];return''}
function numberVal(x,keys,indices){var v=val(x,keys);if(v!==''&&v!=null&&!isNaN(Number(v)))return Number(v);if(x&&x.__values){for(var i=0;i<indices.length;i++){var n=Number(x.__values[indices[i]]);if(!isNaN(n))return n}}return 0}
function stageText(x){var s=stageOfRow(x);return s==='pre'?'课前':s==='mid'?'课中':s==='post'?'课后':String(dataVal(x,['环节','stage'],3)||'其他')}
function moduleText(x){var m=String(dataVal(x,['模块','module'],4)||'');var map={choice:'选择题',fill_blank:'选词填空',ordering:'连词成句',output:'输出题',handwriting:'汉字书写',homework_summary:'作业总结',image_guess:'图片猜词',sentence_match:'词句匹配'};return map[m]||m||'其他题型'}
function resultText(x){var r=String(dataVal(x,['结果','result','autoResult'],14)||'').toLowerCase();if(r==='correct'||r==='正确')return'正确';if(r==='wrong'||r==='错误')return'错误';if(r==='submitted'||r==='已提交')return'已提交';return r||'未记录'}
function statusText(x){var s=String(dataVal(x,['批改状态','status'],16)||'');if(s==='待批改')return'待批改';if(s==='已批改')return'已批改';if(s==='无需批改')return'无需批改';return s}
function stageOfRow(x){var s=String(dataVal(x,['环节','stage'],3)||'').trim().toLowerCase();if(s==='预习'||s==='课前'||s==='pre'||s==='pre_class'||s==='preclass')return'pre';if(s==='课中'||s==='in_class'||s==='inclass')return'mid';if(s==='课后'||s==='post_class'||s==='postclass')return'post';return s}
function renderStudents(){var names={},rows=allRows();rows.forEach(function(x){var n=val(x,['姓名','studentName','name','濮撳悕']);if(n)names[n]=1});var list=Object.keys(names).sort(),selected=state.student||'';if(selected)return renderStudentDetail(selected);if(!list.length)return'<div class="empty">暂无学生数据。请先刷新云端数据或导入 JSON。</div>';return'<div class="student-grid">'+list.map(function(n){var rs=studentRows(n),pre=rs.filter(function(x){return val(x,['环节','stage'])==='课前'||val(x,['stage'])==='pre_class'}),mid=rs.filter(function(x){return val(x,['环节','stage'])==='课中'||val(x,['stage'])==='in_class'}),post=rs.filter(function(x){return val(x,['环节','stage'])==='课后'||val(x,['stage'])==='post_class'}),pending=rs.filter(function(x){return isReviewModule(val(x,['模块','module']))||String(val(x,['批改状态','status'])).indexOf('待')>=0});return'<div class="student-card"><h3>'+esc(n)+'</h3><div class="line"><span>课前</span><b>'+pre.length+' 条</b></div><div class="line"><span>课中</span><b>'+mid.length+' 条</b></div><div class="line"><span>课后</span><b>'+post.length+' 条</b></div><div class="line"><span>待处理</span><b class="'+(pending.length?'bad':'ok')+'">'+pending.length+'</b></div><a href="?student='+encodeURIComponent(n)+'" onclick="openStudent(\''+String(n).replace(/'/g,"\\'")+'\');return false">查看该学生记录 →</a></div>'}).join('')+'</div>'}
function openStudent(n){state.student=n;state.pendingStudent=n;render()}
function renderStudentDetail(n){var rows=studentRows(n),pre=rows.filter(function(x){return stageOfRow(x)==='pre'}),mid=rows.filter(function(x){return stageOfRow(x)==='mid'}),post=rows.filter(function(x){return stageOfRow(x)==='post'}),scored=rows.filter(function(x){return numberVal(x,['总分','total'],[7,6])>0}),score=scored.reduce(function(s,x){return s+numberVal(x,['得分','score'],[6,5])},0),total=scored.reduce(function(s,x){return s+numberVal(x,['总分','total'],[7,6])},0),correct=mid.filter(function(x){var r=resultText(x);return r==='正确'||(numberVal(x,['总分','total'],[7,6])>0&&numberVal(x,['得分','score'],[6,5])===numberVal(x,['总分','total'],[7,6]))}).length,pending=rows.filter(function(x){return statusText(x)==='待批改'||isReviewModule(dataVal(x,['模块','module'],4))}).length;return'<div class="panel"><button class="btn secondary" onclick="setStudentFilter(\'\')">← 返回全班 / Back</button><h2 style="margin-top:14px">'+esc(n)+' · 当前课程：HSK1-L02</h2>'+cards([{n:score+'/'+total,l:'总得分'},{n:total?Math.round(score/total*100)+'%':'--',l:'总体准确率'},{n:pre.length+'/'+mid.length+'/'+post.length,l:'课前 / 课中 / 课后记录'},{n:pending,l:'待处理记录'}])+'<div class="panel"><h2>学习情况分析</h2><p class="muted">课前记录 '+pre.length+' 条，课中参与 '+mid.length+' 条，课后记录 '+post.length+' 条。课中正确率：'+(mid.length?Math.round(correct/mid.length*100):0)+'%。'+(pending?'仍有 '+pending+' 条记录需要教师处理。':'当前没有待处理记录。')+'</p></div>'+tableStudentRows(rows)+'</div>'}
function tableStudentRows(rows){if(!rows.length)return'<div class="empty">暂无该学生记录。</div>';return'<table><tr><th>环节</th><th>模块</th><th>题号</th><th>得分</th><th>结果 / 状态</th><th>学生作答</th></tr>'+rows.slice().reverse().map(function(x){var sc=numberVal(x,['得分','score'],[6,5]),tt=numberVal(x,['总分','total'],[7,6]),res=resultText(x);if(res==='未记录'&&tt>0)res=sc===tt?'正确':'错误';return'<tr><td>'+esc(stageText(x))+'</td><td>'+esc(moduleText(x))+'</td><td>'+esc(dataVal(x,['题号','questionId'],5))+'</td><td>'+esc(sc)+'/'+esc(tt)+'</td><td>'+esc(res+(statusText(x)?' · '+statusText(x):''))+'</td><td>'+esc(String(dataVal(x,['学生作答','answer'],13)).slice(0,160))+'</td></tr>'}).join('')+'</table>'}
function populateStudents(){var sel=document.getElementById('studentFilter'),names={},rows=allRows();rows.forEach(function(x){var n=val(x,['姓名','studentName','name','濮撳悕']);if(n)names[n]=1});var keep=state.student||new URLSearchParams(location.search).get('student')||'';sel.innerHTML='<option value="">全班</option>'+Object.keys(names).sort().map(function(n){return'<option value="'+esc(n)+'"'+(n===keep?' selected':'')+'>'+esc(n)+'</option>'}).join('');state.student=keep;state.pendingStudent=keep}
function populateLessons(){var sel=document.getElementById('lessonFilter'),items=window.HSK1_CURRICULUM||[{id:'HSK1-L02',no:2,title:'我叫李文',openForUse:true}],keep=state.pendingLesson||LESSON;sel.innerHTML=items.filter(function(x){return x.teacherVisible!==false}).map(function(x){return'<option value="'+esc(x.id)+'"'+(x.id===keep?' selected':'')+'>'+esc(x.id+' · '+x.title)+'</option>'}).join('');state.pendingLesson=keep}
function render(){populateLessons();populateStudents();document.getElementById('app').innerHTML=tab==='pre'?renderPre():tab==='inclass'?renderInClass():tab==='post'?renderPost2():tab==='students'?renderStudents():renderOverview()}
function exportMerged(){var data={lesson:LESSON,room:ROOM,exportedAt:new Date().toISOString(),cloudRows:state.cloudRows,localData:state.localData,importedData:state.importedData};var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json;charset=utf-8'}));a.download='ClassPro_'+LESSON+'_merged_data.json';a.click()}
function analysisRows(){
  var rows=allRows();
  if(!rows.length) rows=localRecords();
  return rows;
}
function analysisStage(x){
  var s=stageOfRow(x);
  return s==='pre'||s==='mid'||s==='post'?s:'';
}
function analysisModule(x){return String(dataVal(x,['module','模块'],4)||'');}
function analysisStudent(x){return String(dataVal(x,['studentName','姓名','name'],1)||'').trim();}
function analysisScore(x){return numberVal(x,['score','得分'],[6,5]);}
function analysisTotal(x){return numberVal(x,['total','总分'],[7,6]);}
function analysisPending(x){var m=analysisModule(x),s=String(dataVal(x,['status','批改状态'],16)||'');return m==='output'||m==='handwriting'||s.indexOf('\u5f85')>=0;}
function aggregateStudents(rows){
  var by={};
  rows.forEach(function(x){var n=analysisStudent(x);if(!n||n==='__CLASS__')return;var a=by[n]||(by[n]={name:n,score:0,total:0,attempts:0,correct:0,pre:0,mid:0,post:0,pending:0,weak:{}}),st=analysisStage(x),sc=analysisScore(x),tt=analysisTotal(x),res=resultText(x);if(st==='pre')a.pre++;if(st==='mid')a.mid++;if(st==='post')a.post++;if(tt>0){a.score+=sc;a.total+=tt;a.attempts++;if(res==='\u6b63\u786e'||res==='correct'||sc===tt)a.correct++;}if(analysisPending(x))a.pending++;var weak=dataVal(x,['weakPoints','薄弱点'],15);if(weak)a.weak[weak]=(a.weak[weak]||0)+1;});
  return Object.keys(by).sort().map(function(n){var a=by[n];a.accuracy=a.total?Math.round(a.score/a.total*100):0;a.correctRate=a.attempts?Math.round(a.correct/a.attempts*100):0;return a;});
}
function studentAnalysisTable(){
  var list=aggregateStudents(analysisRows());
  if(!list.length)return'<div class="empty">暂无按学生聚合数据。请先刷新云端数据或导入课堂记录。</div>';
  return'<div class="panel"><h2>按学生分析</h2><table><tr><th>学生</th><th>总得分</th><th>准确率</th><th>课前 / 课中 / 课后</th><th>待批改</th><th>学习情况分析</th></tr>'+list.map(function(a){var weak=Object.keys(a.weak).slice(0,2).join('、');var note=a.pending?'有 '+a.pending+' 条记录待教师批改':(a.accuracy>=85?'掌握情况较好，建议继续拓展':'建议重点复习错题和薄弱点');if(weak)note+='；薄弱点：'+weak;return'<tr><td>'+esc(a.name)+'</td><td>'+esc(a.score)+' / '+esc(a.total)+'</td><td>'+esc(a.accuracy)+'%</td><td>'+esc(a.pre)+' / '+esc(a.mid)+' / '+esc(a.post)+'</td><td>'+esc(a.pending)+'</td><td>'+esc(note)+'</td></tr>'}).join('')+'</table></div>';
}
function currentPerformance(){var list=aggregateStudents(analysisRows()),score=list.reduce(function(s,a){return s+a.score},0),total=list.reduce(function(s,a){return s+a.total},0),active=list.filter(function(a){return a.pre+a.mid+a.post>0}).length;return'<div class="panel"><h2>当前课表现 · '+esc(LESSON)+'</h2><div class="grid"><div class="card"><div class="num">'+active+'</div><div class="label">有学习记录学生</div></div><div class="card"><div class="num">'+score+'/'+total+'</div><div class="label">全班总得分</div></div><div class="card"><div class="num">'+(total?Math.round(score/total*100):0)+'%</div><div class="label">全班准确率</div></div></div></div>'}
function historyReports(){var blocks=window.HSK1_REPORT_BLOCKS||[{from:1,to:5,label:'第一阶段（第1—5课）'},{from:6,to:10,label:'第二阶段（第6—10课）'},{from:11,to:15,label:'第三阶段（第11—15课）'}],rows=state.cloudRows||[],by={};rows.forEach(function(x){var id=String(val(x,['lesson','课程'])||'').toUpperCase(),m=id.match(/HSK1-L(\\d+)/);if(!m)return;var no=Number(m[1]),a=by[no]||(by[no]={score:0,total:0,records:0});a.score+=analysisScore(x);a.total+=analysisTotal(x);a.records++;});var trend=Object.keys(by).sort(function(a,b){return Number(a)-Number(b)}).map(function(no){var a=by[no];return'第'+Number(no)+'课：'+(a.total?Math.round(a.score/a.total*100):0)+'%（'+a.records+'条记录）'}).join(' · ');return'<div class="panel"><h2>历史趋势与五课阶段报告</h2><p class="muted">'+(trend||'当前尚无跨课程数据；完成更多课程后将在这里显示每课趋势。')+'</p>'+blocks.map(function(b){var n=0,s=0,t=0;for(var i=b.from;i<=b.to;i++){if(by[i]){n++;s+=by[i].score;t+=by[i].total}}return'<div class="card" style="margin-top:8px"><b>'+esc(b.label)+'</b><div class="muted">已记录 '+n+' / '+(b.to-b.from+1)+' 课 · 阶段准确率 '+(t?Math.round(s/t*100):0)+'%</div></div>'}).join('')+'</div>'}
function renderOverview(){var p=preStats(),i=inStats(),po=postStats();return cards([{n:p.students,l:'课前完成人数'},{n:p.acc+'%',l:'课前客观正确率'},{n:i.participants+'/'+i.students,l:'课中参与'},{n:i.acc+'%',l:'课中正确率'},{n:po.submitted,l:'课后提交人数'},{n:po.pending+p.pending,l:'待批改/查看'}])+currentPerformance()+studentAnalysisTable()+historyReports()+renderSuggestions()}
loadLocal();render();
</script>
