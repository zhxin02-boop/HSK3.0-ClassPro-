<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><script src="../shared/students.js"></script><script src="../shared/context.js"></script><title>ClassReady 课前测试 - HSK1 L1</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,Microsoft YaHei,sans-serif;background:#f5f0ee;padding:20px;color:#333}.app{max-width:480px;margin:0 auto}h1{font-size:22px;margin-bottom:4px;color:#c0392b}.sub{color:#888;font-size:14px;margin-bottom:20px}.q{background:#fff;border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}.type{font-size:12px;color:#c0392b;font-weight:600;margin-bottom:8px}.prompt{font-size:16px;font-weight:600;margin-bottom:12px}.opt{display:block;width:100%;padding:14px 16px;margin-bottom:8px;border:2px solid #e0d5d0;border-radius:12px;background:#fff;font-size:16px;text-align:left;cursor:pointer}.opt.correct{border-color:#27ae60;background:#e8f5e9}.opt.wrong{border-color:#e74c3c;background:#fcecea}.exam,.name-input{display:block;width:100%;padding:14px;margin-bottom:12px;border:2px solid #e0d5d0;border-radius:12px;font-size:16px;outline:none;font-family:inherit}.exam{resize:vertical;min-height:80px}.btn{width:100%;padding:16px;border:none;border-radius:12px;background:#c0392b;color:#fff;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:10px}.result{text-align:center;padding:40px 20px}.result .score{font-size:48px;font-weight:900;color:#c0392b}.result p{color:#888;margin-top:8px}</style></head><body><div class="app"><h1>HSK1 第1课</h1><p class="sub">AI小语，你好！ - ClassReady 课前预习</p><select class="name-input" id="nameInput"><option value="">Select your name / 选择姓名</option></select><div id="questions"></div><div id="result" style="display:none"></div><p id="startWrap"><button class="btn" onclick="start()">开始答题 / Start</button></p></div><script>
var GAS_URL='https://script.google.com/macros/s/AKfycbxrCd6f6cQ3wocXYQZyLKY0JutolEmOWWzTGOABnnHHJOm697OfyBlkLw-SQ-u-9ZAO/exec',questions=[{type:'词义辨认',prompt:'请选择正确意思',question:'“你好”是什么意思？',options:['hello','thank you','goodbye','teacher'],correct:0,kp:'词汇：你好'},{type:'选词填空',prompt:'选择合适的词填空',question:'老师，___好！',options:['您','你们','大家','们'],correct:0,kp:'语法：您'},{type:'交际理解',prompt:'请选择合适的回答',question:'“谢谢”的回答通常是：',options:['不客气','再见','你好','大家好'],correct:0,kp:'交际功能：感谢与回应'},{type:'词义辨认',prompt:'请选择正确意思',question:'“再见”是什么意思？',options:['hello','thank you','goodbye','teacher'],correct:2,kp:'词汇：再见'},{type:'语法理解',prompt:'请选择正确答案',question:'“你们”表示：',options:['一个人','一组人','一个老师','一个名字'],correct:1,kp:'语法：们'},{type:'交际理解',prompt:'请选择正确答案',question:'“大家好”是对谁说的？',options:['所有人','一个老师','一个学生','自己'],correct:0,kp:'词汇：大家'},{type:'词形辨认',prompt:'请选择复数表达',question:'请选择正确的词：',options:['学生们','学生您','学生好','学生再见'],correct:0,kp:'语法：们'},{type:'课文理解',prompt:'请选择合适的表达',question:'第一次见面，可以说：',options:['你好','谢谢','再见','不客气'],correct:0,kp:'交际功能：问候'},{type:'开放表达',prompt:'请写一句问候老师的话',question:'请使用“老师”和“您好”。',openEnded:true,kp:'综合：礼貌问候'},{type:'开放表达',prompt:'请写出“谢谢”的回答',question:'请写一个礼貌的回答。',openEnded:true,kp:'综合：感谢与回应'}];
var studentName='',current=0,autoScore=0,qDiv=document.getElementById('questions'),rDiv=document.getElementById('result');function start(){studentName=document.getElementById('nameInput').value.trim();if(!studentName){alert('请先选择名字');return}document.getElementById('nameInput').style.display='none';document.getElementById('startWrap').style.display='none';renderQ()}function send(q,answer,score,total,open){var c=window.ClassProContext?ClassProContext.read():{};navigator.sendBeacon(GAS_URL,new Blob([JSON.stringify({studentName:studentName,lesson:'HSK1-L01',room:c.room||'8888',stage:'pre_class',module:q.type,score:score,total:total,weakPoints:score?'':q.kp,answer:answer,questionId:'pre_l01_'+(current+1),questionText:q.question||q.prompt,openEnded:open?'yes':'no',submittedAt:new Date().toISOString()})],{type:'text/plain'}))}function renderQ(){if(current>=questions.length){showResult();return}var q=questions[current],h='<div class="q"><div class="type">'+(current+1)+'/'+questions.length+' '+q.type+'</div><div class="prompt">'+q.prompt+'</div>';if(q.openEnded){h+='<p style="margin-bottom:12px;font-size:18px">'+q.question+'</p><textarea class="exam" id="answer" placeholder="在这儿写你的句子..."></textarea><button class="btn" onclick="submitOpen()">提交 / Submit</button>'}else{h+='<p style="margin-bottom:12px;font-size:18px">'+q.question+'</p>';q.options.forEach(function(o,i){h+='<button class="opt" onclick="select('+i+')">'+o+'</button>'})}qDiv.innerHTML=h}function select(i){var q=questions[current],ok=i===q.correct,opts=document.querySelectorAll('.opt');opts[i].classList.add(ok?'correct':'wrong');if(!ok)opts[q.correct].classList.add('correct');if(ok)autoScore++;send(q,q.options[i],ok?1:0,1,false);setTimeout(function(){current++;renderQ()},700)}function submitOpen(){var ans=document.getElementById('answer').value.trim();if(!ans){alert('请先写句子');return}var q=questions[current];send(q,ans,0,10,true);current++;renderQ()}function showResult(){qDiv.style.display='none';document.getElementById('startWrap').style.display='none';rDiv.style.display='block';rDiv.innerHTML='<div class="result"><div class="score">'+autoScore+'/8</div><p>客观题完成！开放题已提交，等待老师批改。</p><a class="btn" href="../in-class/student.html?room=8888&lesson=HSK1-L01">进入课中互动 / Join Class</a></div>'}document.getElementById('nameInput').innerHTML='<option value="">Select your name / 选择姓名</option>'+(window.CLASS_STUDENTS||[]).map(function(n){return'<option value="'+n+'">'+n+'</option>'}).join('');</script></body></html>
