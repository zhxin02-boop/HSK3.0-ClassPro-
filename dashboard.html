<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ClassReady - Teacher Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,sans-serif;background:#f5f0ee;color:#3d2b1f;padding:20px}h1{color:#8b1a1a;margin-bottom:20px}h2{color:#3d2b1f;margin:16px 0 8px}.hd{background:linear-gradient(135deg,#8b1a1a,#c0392b);color:#fff;padding:20px;border-radius:16px;margin-bottom:20px}table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}th{background:#c0392b;color:#fff;padding:12px;font-size:13px;text-align:left}td{padding:10px 12px;border-bottom:1px solid #f0e8e4;font-size:13px}tr:hover{background:#fcf8f6}.btn{padding:6px 14px;border:none;border-radius:8px;background:#c0392b;color:#fff;cursor:pointer;font-size:12px}.btn:hover{opacity:.9}.empty{padding:40px;text-align:center;color:#a08070;font-size:14px}.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}.badge.g{background:#e8f5e9;color:#28a745}.badge.y{background:#fff3e0;color:#e67e22}.badge.r{background:#ffe8e8;color:#dc3545}#detail{display:none;margin-top:16px;background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}.rec{padding:10px;border-bottom:1px solid #f0e8e4;font-size:13px}.rec:last-child{border-bottom:none}.sc{font-weight:700;font-size:18px;color:#8b1a1a}.tag{font-size:11px;color:#a08070}</style></head><body>
<div class="hd"><h1>📊 ClassReady Teacher Dashboard</h1><p style="font-size:14px;opacity:.85">View all students' preview results</p></div>
<div id="main"><div class="empty">Loading...</div></div>
<div id="detail"><h2 id="detailName"></h2><div id="detailContent"></div><button class="btn" onclick="closeDetail()" style="margin-top:12px">◀ Back</button></div>
<script>
function load(){fetch("/api/students").then(function(r){return r.json();}).then(function(data){var h='<table><tr><th>Name</th><th>Attempts</th><th>Last Score</th><th>Accuracy</th><th>Lesson</th><th>Date</th><th></th></tr>';if(data.length===0){h='<div class="empty">No student data yet. Students need to complete ClassReady and save their results.</div>';}else{data.forEach(function(s){var badge=s.lastPct>=70?"g":s.lastPct>=50?"y":"r";h+="<tr><td><b>"+s.name+"</b></td><td>"+s.attempts+"</td><td>"+(s.lastScore||"-")+"</td><td><span class=\"badge "+badge+"\">"+(s.lastPct?s.lastPct+"%":"-")+"</span></td><td>"+(s.lastLesson||"-")+"</td><td class=\"tag\">"+(s.lastDate?s.lastDate.substring(0,10):"-")+"</td>";h+="<td><button class=\"btn\" onclick=\"viewStudent('"+s.name+"')\">Details</button></td></tr>";});h+="</table>";}document.getElementById("main").innerHTML=h;}).catch(function(){document.getElementById("main").innerHTML='<div class="empty">Failed to load data. Is the server running?</div>';});}
function viewStudent(name){fetch("/api/student/"+encodeURIComponent(name)).then(function(r){return r.json();}).then(function(data){document.getElementById("detail").style.display="block";document.getElementById("detailName").textContent="📋 "+data.name+" - All Records";var h="";data.records.forEach(function(r,i){h+='<div class="rec"><div><span class="sc">'+r.score+'/'+r.total+'</span> ('+r.pct+'%) <span class="tag">'+r.date.substring(0,10)+'</span> <span class="tag">'+r.lesson+'</span></div>';if(r.details&&r.details.length){h+='<div style="margin-top:4px;font-size:12px;color:#a08070">';r.details.forEach(function(d){h+="<span style=\"color:"+(d.correct?"#28a745":"#dc3545")+"\">"+(d.correct?"✓":"✗")+" "+d.q+"</span> | ";});h+="</div>";}h+="</div>";});document.getElementById("detailContent").innerHTML=h;}).catch(function(){document.getElementById("detailContent").innerHTML="Error loading data";});}
function closeDetail(){document.getElementById("detail").style.display="none";}
load();
</script>
</body>
</html>
