<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK 中文课程</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f6f7f8;color:#263238;font-family:"Microsoft YaHei",Arial,sans-serif}
.app{width:min(720px,100%);margin:0 auto;padding:28px 18px 44px}
.top{padding:8px 2px 24px;border-bottom:1px solid #e1e5e8;margin-bottom:18px}
.top h1{font-size:26px;font-weight:700;letter-spacing:.02em}
.top p{margin-top:7px;color:#718096;font-size:14px}
.level{background:#fff;border:1px solid #e1e5e8;border-radius:14px;margin:12px 0;overflow:hidden;box-shadow:0 3px 12px rgba(38,50,56,.05)}
.level-head{width:100%;border:0;background:#fff;color:#263238;display:flex;align-items:center;gap:14px;padding:18px 20px;text-align:left;cursor:pointer;font:inherit}
.level-head:hover{background:#fafbfc}
.level-no{width:38px;height:38px;border-radius:10px;background:#eef1f3;display:grid;place-items:center;font-size:16px;font-weight:700;color:#455a64;flex:none}
.level-main{flex:1}.level-title{font-size:17px;font-weight:700}.level-sub{font-size:12px;color:#87939b;margin-top:3px}
.chevron{font-size:18px;color:#90a0a8;transition:transform .2s}.level.open .chevron{transform:rotate(90deg)}
.lesson-list{display:none;padding:0 18px 16px 72px}.level.open .lesson-list{display:block}
.lesson{display:flex;align-items:center;gap:10px;padding:12px 14px;margin-top:8px;border:1px solid #e7eaec;border-radius:10px;text-decoration:none;color:#263238;background:#fbfcfc}
.lesson:hover{background:#f4f7f8;border-color:#cbd5da}.lesson-code{font-size:12px;color:#607d8b;font-weight:700;min-width:76px}.lesson-name{font-size:14px;flex:1}.lesson-en{font-size:12px;color:#87939b}.lesson-go{color:#90a0a8;font-size:18px}
.empty{padding:4px 0 2px;color:#9aa5ab;font-size:13px}
@media(max-width:520px){.app{padding:20px 12px 32px}.top h1{font-size:23px}.lesson-list{padding-left:58px}.lesson{display:grid;grid-template-columns:1fr auto;gap:4px 8px}.lesson-code{grid-column:1}.lesson-name{grid-column:1}.lesson-en{grid-column:1}.lesson-go{grid-column:2;grid-row:1 / span 3;align-self:center}}
</style>
</head>
<body>
<main class="app">
  <header class="top">
    <h1>HSK 中文课程</h1>
    <p>请选择 HSK 级别，再选择课程开始学习</p>
  </header>
  <section id="levels" aria-label="HSK课程级别"></section>
</main>
<script>
var levels=[
  {id:"1",name:"HSK 1级",desc:"入门级 · Beginner",lessons:[
    {id:"HSK1-L01",name:"AI小语，你好！",en:"Hello, AI Xiaoyu!"},
    {id:"HSK1-L02",name:"我叫李文",en:"My name is Li Wen"}
  ]},
  {id:"2",name:"HSK 2级",desc:"初级 · Elementary",lessons:[]},
  {id:"3",name:"HSK 3级",desc:"中级 · Intermediate",lessons:[]},
  {id:"4",name:"HSK 4级",desc:"中高级 · Upper-Intermediate",lessons:[]},
  {id:"5",name:"HSK 5级",desc:"高级 · Advanced",lessons:[]}
];
function lessonUrl(id){return "source/student/index.html?lesson="+encodeURIComponent(id)}
function render(){
  document.getElementById("levels").innerHTML=levels.map(function(level,index){
    var items=level.lessons.length?level.lessons.map(function(lesson){
      return '<a class="lesson" href="'+lessonUrl(lesson.id)+'"><span class="lesson-code">'+lesson.id+'</span><span class="lesson-name">'+lesson.name+'</span><span class="lesson-en">'+lesson.en+'</span><span class="lesson-go">›</span></a>';
    }).join(""):'<div class="empty">课程内容准备中</div>';
    return '<article class="level '+(index===0?'open':'')+'"><button class="level-head" type="button" aria-expanded="'+(index===0?'true':'false')+'" onclick="toggleLevel(this)"><span class="level-no">'+level.id+'</span><span class="level-main"><span class="level-title">'+level.name+'</span><span class="level-sub">'+level.desc+' · '+level.lessons.length+'课</span></span><span class="chevron">›</span></button><div class="lesson-list">'+items+'</div></article>';
  }).join("");
}
function toggleLevel(button){var level=button.parentElement;var open=level.classList.toggle("open");button.setAttribute("aria-expanded",String(open));}
render();
</script>
</body>
</html>
